};


/* ══════════════════════════════════════════════════════════════
   2. UTILITY HELPERS
══════════════════════════════════════════════════════════════ */

/** Build a Google Sheets CSV export URL from SHEET_ID + GID */
function sheetURL(gid) {
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/export?format=csv&gid=${gid}`;
}

/** Fetch a CSV URL and parse it with D3 */
async function fetchCSV(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`HTTP ${response.status} fetching ${url}`);
  const text = await response.text();
  return d3.csvParse(text);
}

/** Fetch the raw text of the metadata sheet (not parsed as CSV table) */
async function fetchMetaRaw(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`HTTP ${response.status} fetching ${url}`);
  return response.text();
}

/** Return node fill color based on register_location */
function locationColor(location) {
  if (!location) return LOCATION_COLORS['default'];
  // Try exact match first, then partial match
  if (LOCATION_COLORS[location]) return LOCATION_COLORS[location];
  const key = Object.keys(LOCATION_COLORS).find(k => location.includes(k));
  return key ? LOCATION_COLORS[key] : LOCATION_COLORS['default'];
}

/** Clamp a value between min and max */
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/** Convert polar to Cartesian coordinates */
function polarToXY(angleDeg, radius) {
  const rad = (angleDeg - 90) * (Math.PI / 180); // -90 so 0° is top
  return { x: radius * Math.cos(rad), y: radius * Math.sin(rad) };
}

/** Show / hide the loading overlay */
function setOverlay(visible, msg, isError = false) {
  const el = document.getElementById('overlay');
  el.style.display = visible ? 'flex' : 'none';
  if (visible) {
    el.innerHTML = isError
      ? `<div class="overlay-error">⚠ ${msg}</div>`
      : `<div class="overlay-spinner"></div><div class="overlay-text">${msg}</div>`;
  }
}



/* ══════════════════════════════════════════════════════════════
   COLOR CONFIG — fetched from Google Sheet
   Sheet columns: variable_name | default | focused
   Automatically updates LOCATION_COLORS and EDGE_STYLES when
   the spreadsheet values change.
══════════════════════════════════════════════════════════════ */

/* Edge type → variable_name mapping (matches sheet values) */
const EDGE_TYPE_TO_VAR = {
  'shareholding':                          'Shareholding',
  'Past shareholding':                     'Past shareholding',
  'Non-shareholding/control relationship': 'Non-shareholding',
  'Past relationship':                     'Past non-shareholding',
};

async function fetchColorConfig() {
  const url = `https://docs.google.com/spreadsheets/d/1Rx2FVV0R5IV3FnVI9lBX9i2dLXqB2egQCxs0qKGLHvQ/export?format=csv&gid=964234344`;
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1); // skip header

    const colorMap = {};
    rows.forEach(row => {
      /* CSV parse: handle quoted fields */
      const cols = row.match(/(".*?"|[^,]+)(?=,|$)/g) || row.split(',');
      const name    = (cols[0] || '').replace(/"/g, '').trim();
      const def     = (cols[1] || '').replace(/"/g, '').trim();
      const focused = (cols[2] || '').replace(/"/g, '').trim();
      if (name) colorMap[name] = { default: def, focused: focused || def };
    });

    /* ── Apply UI theme colours → CSS custom properties ─────────
       Sheet variable_name values for UI colours:
       Background, Panel, Border, Primary text, Secondary text,
       Muted text, Accent                                        */
    const uiColorMap = {
      'Background':    '--bg',
      'Panel':         '--panel-bg',
      'Border':        '--panel-border',
      'Primary text':  '--text-primary',
      'Secondary text':'--text-secondary',
      'Muted text':    '--text-muted',
      'Accent':        '--accent',
      'people':        '--people',
    };
    Object.entries(uiColorMap).forEach(([varName, cssVar]) => {
      if (colorMap[varName]) {
        document.documentElement.style.setProperty(cssVar, colorMap[varName].default);
      }
    });

    /* ── Apply location colours ───────────────────────────── */
    const locationKeys = [
      'Thailand', 'Singapore', 'Cambodia / Citizen of Cambodia',
      'Luxembourg', 'Hong Kong', 'Turks & Caicos', 'Seychelles',
      'China', 'Cayman Islands', 'British Virgin Islands', 'No information',
    ];
    locationKeys.forEach(key => {
      if (colorMap[key]) LOCATION_COLORS[key] = colorMap[key].default;
    });
    /* Also set fallback keys */
    if (colorMap['No information']) {
      LOCATION_COLORS['No information'] = colorMap['No information'].default;
      LOCATION_COLORS['no information'] = colorMap['No information'].default; // backward compat
      LOCATION_COLORS['Unknown']  = colorMap['No information'].default;
      LOCATION_COLORS['default']  = colorMap['No information'].default;
    }

    /* ── Apply edge colours ───────────────────────────────── */
    Object.entries(EDGE_TYPE_TO_VAR).forEach(([edgeType, varName]) => {
      if (!colorMap[varName]) return;
      const style = EDGE_STYLES[edgeType];
      if (!style) return;
      style.strokeMuted = colorMap[varName].default;
      style.stroke      = colorMap[varName].focused;
      if (style.bg) {
        style.bg = colorMap[varName].focused;
      }
    });
    /* Update default fallback */
    if (colorMap['Non-shareholding']) {
      EDGE_STYLE_DEFAULT.strokeMuted = colorMap['Non-shareholding'].default;
      EDGE_STYLE_DEFAULT.stroke      = colorMap['Non-shareholding'].focused;
    }

    /* ── Update SVG arrow marker colours ─────────────────────
       Re-colour the <path> inside each marker in the live SVG. */
    const markerColors = {
      'arrow-black':       EDGE_STYLES['Non-shareholding/control relationship']?.stroke       || '#222243',
      'arrow-red':         EDGE_STYLES['shareholding']?.stroke                                || '#3820ec',
      'arrow-grey':        EDGE_STYLES['Past shareholding']?.stroke                           || '#8e9aff',
      'arrow-black-muted': EDGE_STYLES['Non-shareholding/control relationship']?.strokeMuted  || '#e8e8ee',
      'arrow-red-muted':   EDGE_STYLES['shareholding']?.strokeMuted                          || '#e7ecff',
      'arrow-grey-muted':  EDGE_STYLES['Past shareholding']?.strokeMuted                     || '#e7ecff',
    };
    Object.entries(markerColors).forEach(([id, color]) => {
      const markerPath = document.querySelector(`#${id} path`);
      if (markerPath) markerPath.setAttribute('fill', color);
    });

    console.log('[colorConfig] loaded', Object.keys(colorMap).length, 'colours from sheet');
    return colorMap;
  } catch (err) {
    console.warn('[colorConfig] failed to load colours:', err);
    return {};
  }
}

/* ══════════════════════════════════════════════════════════════
   3. DATA LOADING & PREPROCESSING
══════════════════════════════════════════════════════════════ */

/**
 * loadAllData()
 * Fetch nodes, edges, and metadata concurrently.
 * Returns { nodes, edges, meta }
 */
async function loadAllData() {
  const [nodesRaw, edgesRaw, metaText] = await Promise.all([
    fetchCSV(sheetURL(CONFIG.GID_NODES)),
    fetchCSV(sheetURL(CONFIG.GID_EDGES)),
    fetchMetaRaw(sheetURL(CONFIG.GID_META)),
  ]);

  /* ── Parse metadata (B1 = title, B2 = date) ─────────────────
     The CSV has rows like: "Title","My Title"
     d3.csvParse maps column headers from row 0;
     we want the raw second column of rows 0 and 1.          */
  const metaLines = metaText.split('\n').map(l => d3.csvParseRows(l)[0] || []);
  const meta = {
    title:   (metaLines[0] && metaLines[0][1]) ? metaLines[0][1].trim() : 'Network Visualization',
    updated: (metaLines[1] && metaLines[1][1]) ? metaLines[1][1].trim() : '',
  };

  /* ── Normalize nodes ────────────────────────────────────────
     Coerce numeric fields, normalize type strings to lowercase. */
  const nodes = nodesRaw.map(d => ({
    id:                   d.name?.trim()               || '',
    name_th:              d.name_th?.trim()             || d.name?.trim() || '',
    type:                 (d.type?.trim() || 'company').toLowerCase(),
    register_location:    d.register_location?.trim()   || '',
    date_of_incorporation:d.date_of_incorporation?.trim()|| '',
    status:               d.status?.trim()              || '',
    group:                d.group?.trim()               || '',
    mauerberger_linked:   d.mauerberger_linked?.trim()  || '',
    cai_linked:           d.cai_linked?.trim()          || '',
    note:                 d.note?.trim()                || '',
    num_connection:       +d.num_connection             || 0,
    image_name:           d.image_name?.trim()          || '',
    // These will be set during layout:
    x: 0, y: 0, angle: 0,
    /* radius set by type in computeRadialLayout */
    radius: CONFIG.NODE_RADIUS_BY_TYPE[(d.type?.trim() || 'company').toLowerCase()] || CONFIG.NODE_RADIUS_BASE,
  })).filter(d => d.id); // drop empty rows

  /* ── Normalize edges ────────────────────────────────────────
     Trim whitespace, coerce amount to number.                 */
  const nodeIds = new Set(nodes.map(d => d.id));
  const edges = edgesRaw.map(d => ({
    source: d.from?.trim() || '',
    target: d.to?.trim()   || '',
    type:   d.type?.trim()  || '',
    amount: +d.amount       || 0,
    detail: d.detail?.trim()|| '',
  }))
  /* Only keep edges where both endpoints exist in the node list */
  .filter(d => d.source && d.target && nodeIds.has(d.source) && nodeIds.has(d.target));

  return { nodes, edges, meta };
}


/* ══════════════════════════════════════════════════════════════
   4. RADIAL LAYOUT
   Arranges nodes evenly around a circle.
   Sort order: primary = type, secondary = num_connection (desc)
══════════════════════════════════════════════════════════════ */

/**
 * computeRadialLayout(nodes, svgWidth, svgHeight)
 * Mutates each node, adding { x, y, angle, radius }.
 * Returns the orbit radius used.
 */
function computeRadialLayout(nodes, svgWidth, svgHeight) {
  /* The orbit radius = half of the smaller canvas dimension, with padding */
  const orbitRadius = Math.min(svgWidth, svgHeight) * 0.38;

  /* Sort nodes: type priority then num_connection descending */
  const TYPE_ORDER = { 'person': 0, 'company': 1, 'government agency': 2 };
  nodes.sort((a, b) => {
    const tA = TYPE_ORDER[a.type] ?? 9;
    const tB = TYPE_ORDER[b.type] ?? 9;
    if (tA !== tB) return tA - tB;
    /* Alphabetical as secondary sort */
    const nameA = (a.name_th || a.id || "").toLowerCase();
    const nameB = (b.name_th || b.id || "").toLowerCase();
    return nameA.localeCompare(nameB, undefined, { sensitivity: "base" });
  });

  const n = nodes.length;
  /* Spread nodes over 360° minus padding */
  const usableDeg  = 360 - CONFIG.RADIAL_PADDING_DEG;
  const stepDeg    = usableDeg / Math.max(n - 1, 1);
  const startAngle = CONFIG.RADIAL_PADDING_DEG / 2;

  nodes.forEach((node, i) => {
    const angleDeg = startAngle + i * stepDeg;
    const pos = polarToXY(angleDeg, orbitRadius);
    node.angle  = angleDeg;
    node.x      = pos.x;
    node.y      = pos.y;
    /* Radius by node type: person/government=17.5px (35px dia), company=10px (20px dia) */
    node.radius = CONFIG.NODE_RADIUS_BY_TYPE[node.type] ||
                  CONFIG.NODE_RADIUS_BY_TYPE['company'];

  });

  return orbitRadius;
}


/* ══════════════════════════════════════════════════════════════
   4b. GRID LAYOUT  (circuit-diagram style)
   ─────────────────────────────────────────────────────────────
   WHY force-directed first?
   Raw alphabetical / type ordering puts unrelated nodes next to
   each other. A force simulation lets the network's own topology
   pull connected nodes together naturally before we snap to grid.

   WHY RasterFairy?
   After the force sim we have a point cloud with good clustering
   but fractional, overlapping positions. RasterFairy maps that
   cloud onto an integer grid while preserving relative distances
   — so cluster mates end up in adjacent cells, not scattered.

   TRADEOFFS:
   • Grid edges must jog around cells — orthogonal routing is a
     simplification (no true obstacle avoidance).
   • RasterFairy's TSP-based assignment is deterministic but not
     globally optimal; clusters are approximate.
══════════════════════════════════════════════════════════════ */

/**
 * computeClusteredGridLayout(nodes, edges, svgWidth, svgHeight)
 *
 * Pipeline:
 *   1. D3 force simulation  → positions cluster by connectivity
 *   2. Normalize positions  → fit into [0,1] range
 *   3. RasterFairy          → snap to integer grid, preserve clusters
 *   4. Scale to canvas      → apply CONFIG.GRID_SPACING
 *
 * Mutates each node's .gx and .gy (grid cell) and .x, .y (pixel).
 * Returns a Promise (force sim runs async ticks via d3.timer).
 */
function computeClusteredGridLayout(nodes, edges, svgWidth, svgHeight) {
  return new Promise(resolve => {
    try {
      const n = nodes.length;
      if (n === 0) { resolve({}); return; }

      /* ── Step 1: Force simulation ─────────────────────────────────
         Pull connected nodes together so the grid reflects topology.
         We use separate sim-node objects keyed by id so D3 internal
         reordering never misaligns with our nodes[] array.           */
      /* Use deterministic initial positions based on node index so the
       force simulation converges to the same grid every time.
       Without this, Math.random() gives different seeds each run.    */
    const simNodes = nodes.map((d, i) => ({
      id: d.id,
      x: Math.cos(i / nodes.length * Math.PI * 2) * 80,
      y: Math.sin(i / nodes.length * Math.PI * 2) * 80,
    }));
      const idSet    = new Set(nodes.map(d => d.id));
      const simLinks = edges
        .filter(e => idSet.has(e.source) && idSet.has(e.target))
        .map(e => ({ source: e.source, target: e.target }));

      const sim = d3.forceSimulation(simNodes)
        .force('link',      d3.forceLink(simLinks).id(d => d.id).distance(60).strength(0.9))
        .force('charge',    d3.forceManyBody().strength(-250))
        .force('center',    d3.forceCenter(0, 0))
        .force('collision', d3.forceCollide(25))
        .stop();

      for (let i = 0; i < 400; i++) sim.tick();

      /* Map id → simulated (x,y) */
      const posById = new Map(simNodes.map(sn => [sn.id, { x: sn.x || 0, y: sn.y || 0 }]));

      /* ── Step 2: Sort nodes by sim position (scanline order) ──────
         Sort by quantised-Y then X so spatial neighbours become
         adjacent grid cells.                                         */
      const BAND = 60; // px — y quantisation band width
      const withPos = nodes.map((node, origIdx) => {
        const p = posById.get(node.id) || { x: 0, y: 0 };
        return { node, origIdx, sx: p.x, sy: p.y };
      });

      withPos.sort((a, b) => {
        const ra = Math.round(a.sy / BAND);
        const rb = Math.round(b.sy / BAND);
        return ra !== rb ? ra - rb : a.sx - b.sx;
      });

      /* ── Step 3: Assign integer grid cells ────────────────────────
         Fill row-by-row in sorted order.
         result[origIdx] = [col, row]                                 */
      const numCols = Math.max(1, Math.ceil(Math.sqrt(n)));
      const numRows = Math.ceil(n / numCols);
      const result  = new Array(n);

      withPos.forEach(({ origIdx }, rank) => {
        result[origIdx] = [rank % numCols, Math.floor(rank / numCols)];
      });

      /* Verify all slots filled */
      for (let i = 0; i < n; i++) {
        if (!Array.isArray(result[i])) {
          console.warn('[grid] result[' + i + '] missing, using fallback');
          result[i] = [i % numCols, Math.floor(i / numCols)];
        }
      }

      /* ── Step 4: Convert to pixel world coordinates ───────────────
         Centre the grid at SVG origin. GRID_SPACING = px per cell.  */
      const S    = CONFIG.GRID_SPACING;
      const offX = -((numCols - 1) * S) / 2;
      const offY = -((numRows - 1) * S) / 2;

      nodes.forEach((node, i) => {
        const col  = result[i][0];
        const row  = result[i][1];
        node.gx   = col;
        node.gy   = row;
        node.gxPx = offX + col * S;
        node.gyPx = offY + row * S;

        /* Guard against NaN — fall back to simple row-major position */
        if (!isFinite(node.gxPx) || !isFinite(node.gyPx)) {
          node.gxPx = offX + (i % numCols) * S;
          node.gyPx = offY + Math.floor(i / numCols) * S;
        }
        node.gridRadius = CONFIG.NODE_RADIUS_BY_TYPE[node.type] || CONFIG.NODE_RADIUS_BASE; // type-based grid radius
      });

      console.log('[grid] done:', n, 'nodes,', numCols, 'cols,', numRows, 'rows, spacing', S);
      console.log('[grid] sample:', nodes.slice(0,3).map(nd =>
        nd.id + '=(' + nd.gxPx.toFixed(0) + ',' + nd.gyPx.toFixed(0) + ')').join(' | '));

      resolve({ cols: numCols, rows: numRows });

    } catch (err) {
      console.error('[grid] computeClusteredGridLayout failed:', err);
      /* Emergency fallback: simple row-major grid, no clustering */
      const n2    = nodes.length;
      const cols2 = Math.max(1, Math.ceil(Math.sqrt(n2)));
      const S     = CONFIG.GRID_SPACING;
      const offX2 = -((cols2 - 1) * S) / 2;
      const offY2 = -(( Math.ceil(n2/cols2) - 1) * S) / 2;
      nodes.forEach((node, i) => {
        node.gxPx = offX2 + (i % cols2) * S;
        node.gyPx = offY2 + Math.floor(i / cols2) * S;
        node.gx   = i % cols2;
        node.gy   = Math.floor(i / cols2);
      });
      resolve({ cols: cols2, rows: Math.ceil(n2 / cols2) });
    }
  });
}

/* ══════════════════════════════════════════════════════════════
   ORTHOGONAL EDGE PATH BUILDER
   ─────────────────────────────────────────────────────────────
   Circuit-diagram style: edges jog 90° rather than going diagonal.
   We use a simple "half-step" midpoint strategy:
     - Travel horizontally to the midpoint X
     - Then vertically to the target Y
     - Then horizontally to the target X
   This keeps paths readable without complex routing algorithms.

   Parallel edges get a small perpendicular offset (jitter) to
   prevent complete overlap on the same horizontal/vertical run.
══════════════════════════════════════════════════════════════ */

/**
 * buildOrthogonalPath(x1, y1, x2, y2, jitter)
 * Returns an SVG path `d` string for an orthogonal (right-angle) edge.
 * jitter: small offset to separate parallel edges (default 0).
 */
function buildOrthogonalPath(x1, y1, x2, y2, jitter = 0) {
  /* Mid-point X — the column where we make the vertical jog */
  const mx = (x1 + x2) / 2 + jitter;
  return `M ${x1} ${y1} L ${mx} ${y1} L ${mx} ${y2} L ${x2} ${y2}`;
}

/**
 * buildOrthogonalPathShortened(x1, y1, x2, y2, targetRadius, jitter)
 *
 * Draws an L-shaped orthogonal path from (x1,y1) to (x2,y2) that:
 *  - Goes horizontal to mid-X, then vertical to target Y, then horizontal.
 *  - Pulls the endpoint back so the arrowhead clears the target node.
 *  - Handles edge cases: same row (only horizontal), same col (only vertical).
 *
 * jitter: horizontal offset on the mid-X to separate parallel edges.
 */
function buildOrthogonalPathShortened(x1, y1, x2, y2, targetRadius, jitter = 0) {
  const r  = (targetRadius ?? CONFIG.NODE_RADIUS_BASE) + 3;
  const dx = x2 - x1;
  const dy = y2 - y1;

  /* ── Same row: pure horizontal line ── */
  if (Math.abs(dy) < 2) {
    const sign = dx >= 0 ? 1 : -1;
    const ex   = x2 - sign * r;
    return `M ${x1} ${y1} L ${ex} ${y2}`;
  }

  /* ── Same column: pure vertical line, shorten at bottom ── */
  if (Math.abs(dx) < 2) {
    const sign = dy >= 0 ? 1 : -1;
    const ey   = y2 - sign * r;
    return `M ${x1} ${y1} L ${x2} ${ey}`;
  }

  /* ── General case: H → V → H (with jitter on mid-X) ── */
  const mx   = (x1 + x2) / 2 + jitter;
  /* Last segment is horizontal from (mx, y2) → (x2, y2).
     Shorten from x2 by r, clamped so we don't overshoot mx. */
  const signX = dx >= 0 ? 1 : -1;
  const minX  = mx + signX * r;               // closest safe endpoint
  const endX  = dx >= 0
    ? Math.max(minX, x2 - r)
    : Math.min(minX, x2 + r);

  return `M ${x1} ${y1} L ${mx} ${y1} L ${mx} ${y2} L ${endX} ${y2}`;
}


/* ══════════════════════════════════════════════════════════════
   5. RENDERING
══════════════════════════════════════════════════════════════ */

/* Module-level state shared between render + interaction */
let SVG_EL, G_ROOT, ZOOM;    // D3 selections + zoom behaviour
let g_edges, g_nodes;        // layer groups
let nodeMap  = new Map();     // id → node datum
let edgeData = [];            // processed edge array
let selectedId = null;        // currently selected node id
let currentLayout = 'radial'; // 'radial' | 'grid'

/**
 * renderGraph(nodes, edges, svgEl)
 * Full render: edges (backgrounds + lines) then nodes.
 */

/* ── UTILITY: wrap text into lines of max N characters ─────────────
   SVG text doesn't wrap. We split on spaces, accumulate words until
   the line exceeds maxChars, then start a new line.                 */
function wrapText(str, maxChars) {
  if (!str) return [];
  /* For scripts without spaces (Thai, CJK), split by grapheme clusters */
  if (!str.includes(' ')) {
    let graphemes;
    try {
      graphemes = [...new Intl.Segmenter().segment(str)].map(s => s.segment);
    } catch (_) {
      graphemes = [...str];
    }
    if (graphemes.length <= maxChars) return [str];
    const lines = [];
    for (let i = 0; i < graphemes.length; i += maxChars) {
      lines.push(graphemes.slice(i, i + maxChars).join(''));
    }
    return lines;
  }
  /* Latin/spaced text: wrap on word boundaries */
  if (str.length <= maxChars) return [str];
  const words = str.split(' ');
  const lines = [];
  let current = '';
  words.forEach(word => {
    if ((current + (current ? ' ' : '') + word).length > maxChars) {
      if (current) lines.push(current);
      current = word;
    } else {
      current = current ? current + ' ' + word : word;
    }
  });
  if (current) lines.push(current);
  return lines;
}

/* ── UTILITY: wrap text to fit within maxPx pixel width ────────────
   Approximates character width at a given font size (px).
   Uses average char width ≈ fontSize * 0.55 for Latin/Thai mixed text.
   Splits on spaces; if a single word exceeds maxPx it is kept as-is.  */
/* wrapTextPx: pixel-width-aware line wrapping with Thai/CJK support.
   For scripts without spaces, splits on grapheme cluster boundaries.
   For Latin text with spaces, wraps on word boundaries.             */
function wrapTextPx(str, maxPx, fontSize) {
  if (!str) return [];
  const avgCharW = fontSize * 0.58;
  const maxChars = Math.max(3, Math.floor(maxPx / avgCharW));

  /* Get grapheme clusters (handles Thai combining chars correctly) */
  let graphemes;
  try {
    graphemes = [...new Intl.Segmenter().segment(str)].map(s => s.segment);
  } catch (_) {
    graphemes = [...str];
  }

  /* Check if text has spaces (Latin-style) — use word-wrap if so */
  if (str.includes(' ')) {
    return wrapText(str, maxChars);
  }

  /* No spaces (Thai, CJK etc.) — split strictly by grapheme count */
  const lines = [];
  let current = [];
  graphemes.forEach(g => {
    current.push(g);
    if (current.length >= maxChars) {
      lines.push(current.join(''));
      current = [];
    }
  });
  if (current.length > 0) lines.push(current.join(''));
  return lines;
}

/* ── UTILITY: shorten a line endpoint by `offset` px ───────────────
   Moves (x2,y2) toward (x1,y1) by `offset` pixels.
   Used to keep arrowheads outside node circles.                      */
function shortenEndpoint(x1, y1, x2, y2, offset) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  return { x2: x2 - (dx / len) * offset, y2: y2 - (dy / len) * offset };
}

/* ── UTILITY: compute shortened edge endpoints for a datum ──────────
   Uses current node positions (passed as sx,sy,tx,ty world coords).
   Returns { x1,y1,x2,y2 } with the target end pulled back.          */
function edgeEndpoints(sx, sy, tx, ty, targetRadius) {
  const offset = (targetRadius ?? CONFIG.NODE_RADIUS_BASE) + 3;
  const { x2, y2 } = shortenEndpoint(sx, sy, tx, ty, offset);
  return { x1: sx, y1: sy, x2, y2 };
}

/* ── Label truncation for radial view ───────────────────────────────
   Uses Intl.Segmenter for grapheme-aware slicing (handles Thai combining
   characters, CJK, etc.). Falls back to code-point spread if unavailable.
   RADIAL_MAX is defined inside renderGraph's label section.             */
const RADIAL_MAX_CHARS = 20; // max graphemes for radial label

function truncateLabel(text) {
  if (!text) return '';
  let graphemes;
  try {
    graphemes = [...new Intl.Segmenter().segment(text)].map(s => s.segment);
  } catch (_) {
    graphemes = [...text];
  }
  if (graphemes.length <= RADIAL_MAX_CHARS) return text;
  return graphemes.slice(0, RADIAL_MAX_CHARS - 1).join('') + '…';
}

/* ── Arrow marker selector — module-level so drawEdgesGrid/Radial can use it */

/* ── Runtime CSS variable reader ───────────────────────────────────────
   Instead of hardcoding hex values, read the live CSS custom property.
   This means any value set by fetchColorConfig() is automatically used. */
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}


/* Cache-buster for images — change this value to force reload of all images */
const IMAGE_CACHE_BUST = Date.now();

function arrowMarkerId(edgeType, muted = false) {
  const suffix = muted ? '-muted' : '';
  if (edgeType === 'shareholding')      return `url(#arrow-red${suffix})`;
  if (edgeType === 'Past shareholding') return `url(#arrow-grey${suffix})`;
  return `url(#arrow-black${suffix})`;
}


/* Draw a visual duplicate of focused edges into #g-edges-focus so they
   render above muted edges. The originals stay in #g-edges with their
   D3 data binding intact — only their colour changes to muted.
   Call clearFocusLayer() on deselect to remove duplicates.           */
function drawFocusLayer(edges, connectedEdgeSet, selectedId, delay = 0) {
  const layer = d3.select('#g-edges-focus');
  layer.selectAll('*').remove();

  const FADE_DUR = 250; // ms fade-in duration

  edges.forEach((e, i) => {
    if (!connectedEdgeSet.has(i)) return;
    const style  = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
    const isGrid = currentLayout === 'grid';
    let el;

    if (!isGrid) {
      /* Radial: straight line at final position */
      const s  = nodeMap.get(e.source), t = nodeMap.get(e.target);
      const sx = e.source === selectedId ? 0 : (s?.x ?? 0);
      const sy = e.source === selectedId ? 0 : (s?.y ?? 0);
      const tx = e.target === selectedId ? 0 : (t?.x ?? 0);
      const ty = e.target === selectedId ? 0 : (t?.y ?? 0);
      const ep = edgeEndpoints(sx, sy, tx, ty, t?.radius);
      el = layer.append('line')
        .attr('class', 'edge-focus-dup')
        .attr('pointer-events', 'none')
        .attr('x1', ep.x1).attr('y1', ep.y1)
        .attr('x2', ep.x2).attr('y2', ep.y2)
        .attr('stroke', style.stroke)
        .attr('stroke-width', 2)
        .attr('stroke-dasharray', style.dash || null)
        .attr('marker-end', arrowMarkerId(e.type, false));
    } else {
      /* Grid: copy the path `d` from the original element */
      const origEl = document.querySelector(
        `.edge-path[data-source="${CSS.escape(e.source)}"][data-target="${CSS.escape(e.target)}"]`
      );
      if (!origEl) return;
      el = layer.append('path')
        .attr('class', 'edge-focus-dup')
        .attr('pointer-events', 'none')
        .attr('d', origEl.getAttribute('d'))
        .attr('fill', 'none')
        .attr('stroke', style.stroke)
        .attr('stroke-width', 2)
        .attr('stroke-dasharray', style.dash || null)
        .attr('marker-end', arrowMarkerId(e.type, false));
    }

    /* Fade in after delay (wait for node movement to finish) */
    el.attr('opacity', 0)
      .transition()
      .delay(delay)
      .duration(FADE_DUR)
      .ease(d3.easeCubicOut)
      .attr('opacity', 1);
  });
}

function clearFocusLayer() {
  d3.select('#g-edges-focus').selectAll('*').remove();
}


/* Reapply current EDGE_STYLES colours to all rendered edge elements.
   Called after fetchColorConfig() updates the style objects so that
   any edges already drawn get the sheet-defined colours.             */
function reapplyEdgeColors() {
  /* Edge lines / paths */
  d3.selectAll('.edge-path').each(function(e) {
    if (!e) return;
    const style = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
    d3.select(this)
      .attr('stroke', style.strokeMuted)
      .attr('marker-end', arrowMarkerId(e.type, true));
  });

  /* Edge background stripes */
  d3.selectAll('.edge-bg').each(function(e) {
    if (!e) return;
    const style = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
    d3.select(this).attr('stroke', style.strokeMuted || style.stroke);
  });

  /* Node circles — update stroke and fill with current CSS variable colours */
  d3.selectAll('circle.node-circle').each(function(d) {
    const node = d ? nodeMap.get(d.id) : null;
    if (!node) return;
    const loc  = node.register_location || node.location || '';
    const type = (node.type || '').toLowerCase();
    const fill = type === 'person'
      ? cssVar('--people')
      : type === 'government agency'
      ? '#ffffff'
      : locationColor(loc);
    d3.select(this)
      .attr('stroke', locationColor(loc))
      .attr('fill', fill);
  });

  /* Update node label fills to use live CSS variable colours */
  d3.selectAll('text.node-label')
    .attr('fill', cssVar('--text-secondary'));

  /* Arrow markers — re-colour after EDGE_STYLES updated by fetchColorConfig */
  const markerColors = {
    'arrow-black':       EDGE_STYLES['Non-shareholding/control relationship']?.stroke      || '#222243',
    'arrow-red':         EDGE_STYLES['shareholding']?.stroke                               || '#3820ec',
    'arrow-grey':        EDGE_STYLES['Past shareholding']?.stroke                          || '#8e9aff',
    'arrow-black-muted': EDGE_STYLES['Non-shareholding/control relationship']?.strokeMuted || '#e8e8ee',
    'arrow-red-muted':   EDGE_STYLES['shareholding']?.strokeMuted                         || '#e7ecff',
    'arrow-grey-muted':  EDGE_STYLES['Past shareholding']?.strokeMuted                    || '#e7ecff',
  };
  Object.entries(markerColors).forEach(([id, color]) => {
    const markerPath = document.querySelector(`#${id} path`);
    if (markerPath) markerPath.setAttribute('fill', color);
  });
}

function renderGraph(nodes, edges, svgEl) {
  const svg    = d3.select(svgEl);
  const width  = svgEl.clientWidth;
  const height = svgEl.clientHeight;

  /* Build lookup map */
  nodeMap.clear();
  nodes.forEach(n => nodeMap.set(n.id, n));

  /* Compute layout (mutates nodes) */
  const orbit = computeRadialLayout(nodes, width, height);
  edgeData = edges; // store for interaction

  /* ── Setup SVG ─────────────────────────────────────────────── */
  svg.selectAll('*').remove(); // clear on re-render

  /* Root group — starts at canvas centre */
  G_ROOT = svg.append('g');

  /* Zoom + pan behaviour.
     We initialise the zoom with a translate(w/2,h/2) so the graph
     starts centred. Storing ZOOM at module level lets switchLayout
     programmatically reset the view when toggling layouts.          */
  ZOOM = d3.zoom()
    .scaleExtent([0.3, 5])
    .on('zoom', e => G_ROOT.attr('transform', e.transform));

  /* Apply initial centring transform through the zoom so D3's internal
     state stays in sync — never set G_ROOT.attr('transform') directly */
  svg.call(ZOOM)
     .call(ZOOM.transform, d3.zoomIdentity.translate(width / 2, height / 2));

  /* Click on empty SVG background → deselect */
  /* Deselect only on clicking truly empty SVG/G_ROOT space.
     Edges stop propagation so this won't fire on edge clicks. */
  svg.on('click', function(event) {
    const tgt = event.target;
    const onNode  = tgt.closest('.node-g');
    const onEdge  = tgt.closest('.edge-path') || tgt.tagName === 'line' || tgt.tagName === 'path';
    const onLabel = tgt.closest('.edge-label-g') || tgt.closest('.node-label');
    if (selectedId && !onNode && !onEdge && !onLabel) {
      clearSelection(nodes, edges);
    }
  });

  /* Orbit ring removed */
  /* Layer order: edge-bg → edges → edge-labels → nodes
     Nodes must be on top so hover/click targets work correctly.     */
  G_ROOT.append('g').attr('id', 'g-edge-bg');
  g_edges = G_ROOT.append('g').attr('id', 'g-edges');
  // g-edge-labels appended after g-node-labels (see below) so labels render on top
  G_ROOT.append('g').attr('id', 'g-edges-focus'); // focused edge duplicates render above all
  g_nodes = G_ROOT.append('g').attr('id', 'g-nodes');

  /* ── SVG <defs>: arrowhead markers for each edge colour ─────────
     We define four markers (black-solid, black-dashed, red-solid,
     red-dashed) so each edge type gets a correctly coloured arrow.
     refX is offset so the arrow tip sits at the node edge, not inside. */
  const defs = svg.append('defs');

  /* Active + muted arrow markers for each edge type */
  const arrowDefs = [
    { id: 'arrow-black',       color: '#222243' },
    { id: 'arrow-red',         color: '#3820ec' },
    { id: 'arrow-grey',        color: '#8e9aff' },
    { id: 'arrow-black-muted', color: '#e8e8ee' },
    { id: 'arrow-red-muted',   color: '#e7ecff' },
    { id: 'arrow-grey-muted',  color: '#e7ecff' },
  ];

  arrowDefs.forEach(({ id, color }) => {
    defs.append('marker')
      .attr('id', id)
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 6)
      .attr('refY', 0)
      .attr('markerWidth', 4)
      .attr('markerHeight', 4)
      .attr('orient', 'auto')
      .append('path')
        .attr('d', 'M0,-5L10,0L0,5')
        .attr('fill', color);
  });

  /* ── Draw shareholding background stripes (amount-scaled width) ─
     These are purely decorative — wider stroke = larger share amount.
     Opacity 0.5 as requested.                                        */
  d3.select('#g-edge-bg')
    .selectAll('line.edge-bg')
    .data(edges.filter(e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).bg))
    .join('line')
    .attr('class', 'edge-bg')
    .attr('x1', e => nodeMap.get(e.source)?.x ?? 0)
    .attr('y1', e => nodeMap.get(e.source)?.y ?? 0)
    .attr('x2', e => nodeMap.get(e.target)?.x ?? 0)
    .attr('y2', e => nodeMap.get(e.target)?.y ?? 0)
    .attr('stroke', e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).strokeMuted)
    .attr('stroke-opacity', 0.5)
    /* Width reflects share amount; capped so it stays readable */
    .attr('stroke-width', e => clamp((e.amount / 5e6) * 20, 2, 40))
    .attr('pointer-events', 'none');

  /* ── Draw main edge lines ────────────────────────────────────────
     Lines are shortened at the TARGET end so the arrowhead sits just
     outside the target node's circumference.                         */
  d3.select('#g-edges')
    .selectAll('line.edge-path')
    .data(edges)
    .join('line')
    .attr('class', 'edge-path')
    .attr('data-source', e => e.source)
    .attr('data-target', e => e.target)
    .each(function(e) {
      const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
      const ep = edgeEndpoints(s?.x ?? 0, s?.y ?? 0, t?.x ?? 0, t?.y ?? 0, t?.radius);
      d3.select(this)
        .attr('x1', ep.x1).attr('y1', ep.y1)
        .attr('x2', ep.x2).attr('y2', ep.y2);
    })
    .attr('stroke', e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).stroke)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).dash)
    .attr('marker-end', e => arrowMarkerId(e.type, true))
    .on('click', e => e.stopPropagation()) // prevent bubbling to SVG background
    ; // hover handled by CSS :hover pseudo-class

  /* ── Edge labels aligned to the line angle ───────────────────────
     Each label uses a <text> with a transform="rotate(angle)" so the
     text runs parallel to its edge. We flip labels on the left half
     of the graph so they are always readable (not upside-down).
     Labels start hidden (opacity 0) and appear on node selection.   */
  /* ── Draw nodes ─────────────────────────────────────────────── */
  const nodeGroups = d3.select('#g-nodes')
    .selectAll('g.node-g')
    .data(nodes, d => d.id)
    .join('g')
    .attr('class', 'node-g')
    .attr('data-node-id', d => d.id)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .on('click', (event, d) => { event.stopPropagation(); onNodeClick(d, nodes, edges); })
    .on('mouseenter', function(event, d) {
      /* White stroke ring on hovered node */
      d3.select(this).select('circle.node-circle')
        .attr('stroke', cssVar('--text-primary'))
        .attr('stroke-width', 2.5);
      /* White label text */
      d3.select(`text[data-label-for="${d.id}"]`).classed('label-hovered', true);
    })
    .on('mouseleave', function(event, d) {
      /* Restore node stroke */
      d3.select(this).select('circle.node-circle')
        .attr('stroke', locationColor(d.register_location))
        .attr('stroke-width', 1.5);
      /* Restore label colour */
      d3.select(`text[data-label-for="${d.id}"]`).classed('label-hovered', false);
    });

  /* Background circle */
  nodeGroups.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => d.radius)
    .attr('fill', d => {
      if (d.type === 'person')            return cssVar('--people');
      if (d.type === 'government agency') return '#fff';
      return locationColor(d.register_location);
    })
    .attr('stroke', d => locationColor(d.register_location))
    .attr('stroke-width', 1.5);

  /* Image clipPath + image element for nodes that have image_name */
  nodeGroups.filter(d => d.image_name)
    .each(function(d) {
      const g   = d3.select(this);
      const uid = `clip-${d.id.replace(/[^a-z0-9]/gi, '_')}`;

      let defsEl = svg.select('defs');
      if (defsEl.empty()) defsEl = svg.append('defs');

      defsEl.append('clipPath')
        .attr('id', uid)
        .append('circle')
          .attr('r', d.radius - 1);

      const rawName = (d.image_name || '').trim().replace(/^images\//, '');
      const withExt = rawName.includes('.') ? rawName : `${rawName}.png`;
      const imgPath = `images/${withExt}?v=${IMAGE_CACHE_BUST}`;
      console.log(`[node image] id="${d.id}" → ${imgPath}`);
      if (window.__debugMode) {
        const dl = document.getElementById('debug-log');
        if (dl) dl.innerHTML += `<div>${d.id} → ${imgPath}</div>`;
      }

      g.append('image')
        .attr('href', imgPath)
        .attr('x', -(d.radius - 1))
        .attr('y', -(d.radius - 1))
        .attr('width',  (d.radius - 1) * 2)
        .attr('height', (d.radius - 1) * 2)
        .attr('clip-path', `url(#${uid})`)
        .attr('preserveAspectRatio', 'xMidYMid slice')
        .on('error', function() {
          console.warn(`[node image] FAILED: ${imgPath}`);
          if (window.__debugMode) {
            const dl = document.getElementById('debug-log');
            if (dl) dl.innerHTML += `<div style='color:#e05c5c'>FAIL: ${imgPath}</div>`;
          }
        });
    });

  /* ── Node labels ─────────────────────────────────────────────────────
     Placed in a TOP-LEVEL group using WORLD coordinates — not inside the
     node <g> — so local transforms don't interfere with positioning.

     Gap: label starts at (node.radius + LABEL_GAP) px from node centre,
     ensuring no text ever overlaps the circle.

     Anchor: flips based on which half of the orbit the node sits on,
     so text always grows AWAY from the centre.

     Collision: iterative Y-axis separation in world space, 20 passes max.
     Wrapping: text > MAX_CHARS split on word boundaries into <tspan> rows. */

  const LABEL_FONT   = 10;
  const LABEL_LINE   = 13;    // px per line
  const LABEL_GAP    = 8;     // px between node edge and label
  // truncateLabel uses RADIAL_MAX_CHARS = 20 (module-level constant)
  const MAX_ITERS    = 20;
  const MIN_SEP      = 2;     // minimum px gap between label bounding boxes

  /* truncateLabel() is defined at module level (see below renderGraph) */

  /* Separate SVG group so labels sit above everything */
  const gLabels = G_ROOT.append('g').attr('id', 'g-node-labels');

  /* Edge labels group — appended LAST so it renders above all nodes */
  const gEdgeLabels = G_ROOT.append('g').attr('id', 'g-edge-labels');

  /* Build one metadata object per node */
  const labelData = nodes.map(d => {
    const angleRad  = (d.angle - 90) * (Math.PI / 180);
    const a         = ((d.angle % 360) + 360) % 360;
    const rawText   = d.name_th || d.id;
    const label     = truncateLabel(rawText);   // single truncated line
    const lines     = [label];                  // always one line in radial
    const height    = LABEL_LINE;

    /* Anchor direction: right half → start (text grows right),
       left half → end (text grows left), top/bottom → middle  */
    const anchor = (a > 10 && a < 170) ? 'start'
                 : (a > 190 && a < 350) ? 'end'
                 : 'middle';

    /* World position of the label anchor point.
       Distance from node centre = radius + gap.
       This puts the ANCHOR at the node edge — for 'start' and 'end'
       anchors the text grows outward, never back over the circle.    */
    const dist = d.radius + LABEL_GAP;
    const wx   = d.x + Math.cos(angleRad) * dist;
    const wy   = d.y + Math.sin(angleRad) * dist;

    return { d, lines, height, wx, wy, nudge: 0, anchor };
  });

  /* Iterative Y collision resolution in world space */
  for (let iter = 0; iter < MAX_ITERS; iter++) {
    labelData.sort((a, b) => (a.wy + a.nudge) - (b.wy + b.nudge));
    let moved = false;
    for (let i = 0; i < labelData.length - 1; i++) {
      const A = labelData[i], B = labelData[i + 1];
      const aBot = (A.wy + A.nudge) + A.height / 2;
      const bTop = (B.wy + B.nudge) - B.height / 2;
      const overlap = aBot - bTop + MIN_SEP;
      if (overlap > 0) {
        A.nudge -= overlap / 2;
        B.nudge += overlap / 2;
        moved = true;
      }
    }
    if (!moved) break;
  }

  /* Render each label as a rotated <text> aligned to its node's angle.
     Strategy:
     - Anchor = point on the node's circle edge + LABEL_GAP outward
     - transform = translate(anchorX, anchorY) rotate(angleDeg)
     - In local rotated frame: x=0 is anchor, tspan x=0 y=lineOffset
     - Left-half nodes get +180° flip so text is never upside-down
     - text-anchor: 'start' so text grows outward (away from circle)   */
  labelData.forEach(({ d, lines, height, wx, wy, nudge, anchor }) => {
    /* Anchor: at node edge + gap, along the radial direction */
    const angleRad = (d.angle - 90) * (Math.PI / 180);
    const dist     = d.radius + LABEL_GAP;
    const anchorX  = d.x + Math.cos(angleRad) * dist;
    const anchorY  = d.y + Math.sin(angleRad) * dist;

    /* Raw rotation: aligns the text x-axis with the outward radial direction.
       rotateDeg = d.angle - 90 because SVG rotation 0° = rightward,
       but our angle 0° = top (clockwise from top).
       Example: angle=0 (top)    → rotateDeg=-90 → x-axis points up    (outward=up)    ✓
                angle=90 (right) → rotateDeg=0   → x-axis points right (outward=right) ✓
                angle=180 (bot)  → rotateDeg=90  → x-axis points down  (outward=down)  ✓
                angle=270 (left) → rotateDeg=180 → x-axis points left  (outward=left)  ✓
       No flip needed — text-anchor:start always grows outward.
       BUT: angles 90–270 have rotateDeg 0–180 which means the text
       baseline runs at angles where it would read normally.
       Angles 270–360 and 0–90 have rotateDeg -90 to 0 / 180–270 —
       text is sideways. This is intentional (spoke-style).
       The only time text is upside-down is rotateDeg in (90°, 270°),
       i.e. when d.angle is in (180°, 360°). Flip those. */
    let rotateDeg = d.angle - 90;
    // Normalise to [-180, 180]
    while (rotateDeg >  180) rotateDeg -= 360;
    while (rotateDeg < -180) rotateDeg += 360;
    // If the rotated x-axis points generally leftward (rotateDeg ±90..180),
    // the text would be upside-down — flip 180° and use end-anchor so it
    // still grows outward (now in the -x direction of the flipped frame).
    const needsFlip = rotateDeg > 90 || rotateDeg < -90;
    if (needsFlip) rotateDeg += rotateDeg > 0 ? -180 : 180;
    const textAnchor = needsFlip ? 'end' : 'start';

    const totalH  = lines.length * LABEL_LINE;
    const startY  = -totalH / 2 + LABEL_LINE / 2;

    const text = d.name_th || d.id;
    const textEl = gLabels.append('text')
      .attr('class', 'node-label')
      .attr('data-label-for', d.id)
      .attr('data-raw-text', text)
      .attr('data-ox', anchorX)
      .attr('data-oy', anchorY)
      .attr('data-rotate', rotateDeg)
      .attr('data-text-anchor', textAnchor)
      .attr('transform', `translate(${anchorX},${anchorY}) rotate(${rotateDeg})`)
      .attr('text-anchor', textAnchor)
      .attr('dominant-baseline', 'middle')
      .attr('font-size', LABEL_FONT)
      .attr('font-family', "'IBM Plex Sans Thai Looped', sans-serif")
      .attr('fill', cssVar('--text-secondary'))
      .attr('pointer-events', 'none');

    lines.forEach((line, li) => {
      textEl.append('tspan')
        .attr('x', 0)
        .attr('y', startY + li * LABEL_LINE)
        .text(line);
    });
  });


  /* Edge labels — delegate to drawEdgeLabelsForLayout which handles
     both positioning and overlap avoidance.
     Called here for the initial radial render; called again by
     switchLayout whenever the layout changes.                     */
  drawEdgeLabelsForLayout(edges, gEdgeLabels);


  SVG_EL = svgEl;
}


/* ══════════════════════════════════════════════════════════════
   6. INTERACTION — node click, highlight, panel update
══════════════════════════════════════════════════════════════ */

/**
 * onNodeClick(datum, nodes, edges)
 *
 * RADIAL MODE: selected node moves to centre (0,0), others stay on orbit.
 * GRID MODE:   nothing moves — only highlight/fade classes are toggled.
 *              Edges stay exactly where they are.
 */
function onNodeClick(datum, nodes, edges) {
  if (selectedId === datum.id) { clearSelection(nodes, edges); return; }

  /* Deselect highlight filter so node connection edges become visible */
  if (activeHighlight) {
    document.querySelectorAll('.highlight-pill').forEach(b => b.classList.remove('active'));
    applyHighlightFilter(null, nodes);
  }

  const prevId = selectedId;
  selectedId   = datum.id;

  /* Identify connected nodes and edges.
     connectedEdgeSet stores edge indices for RADIAL mode (line elements
     in DOM order match edges[] order).
     For GRID mode we check data-source / data-target attributes directly
     since drawEdgesGrid iterates sourceGroups (Map), not edges[] order.  */
  const connectedIds    = new Set([datum.id]);
  const connectedEdgeSet = new Set();   // used by radial mode only
  edges.forEach((e, i) => {
    if (e.source === datum.id || e.target === datum.id) {
      connectedIds.add(e.source);
      connectedIds.add(e.target);
      connectedEdgeSet.add(i);
    }
  });

  const DURATION = 500;
  const ease     = d3.easeCubicInOut;

  if (currentLayout === 'grid') {
    /* ── GRID MODE: highlight only, nothing moves ──────────────────── */

    /* Nodes: fade/highlight via CSS classes + opacity only */
    d3.selectAll('.node-g').each(function(d) {
      const isFocused  = connectedIds.has(d.id);
      const isSelected = d.id === datum.id;
      d3.select(this)
        .classed('faded',          !isFocused)
        .classed('highlighted',    isFocused)
        .classed('node-selected',  isSelected)
        .classed('node-connected', isFocused && !isSelected)
        .transition('focus').duration(DURATION).ease(ease)
        .style('opacity', isFocused ? 1 : CONFIG.FADE_OPACITY);
    });

    /* Labels: fade non-connected, highlight selected */
    d3.selectAll('text.node-label').each(function() {
      const id        = d3.select(this).attr('data-label-for');
      const isFocused = connectedIds.has(id);
      const isCenter  = id === datum.id;
      d3.select(this)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('opacity', isFocused ? 1 : 0.1)
        .attr('fill', isCenter ? cssVar('--text-primary') : cssVar('--text-muted'));
    });

    /* Edges: highlight connected, fade others — NO position change.
       Use data-source / data-target attributes to identify connected edges —
       NOT the loop index, which is unreliable when drawEdgesGrid iterates
       through a Map (sourceGroups) rather than the original edges[] array.
       Inline styles override the attr/style set during appendEdgePath.    */
    /* Edges: colour-swap focus/muted, raise focused to top (SVG z-order) */
    d3.selectAll('.edge-path').each(function(e) {
      const src      = d3.select(this).attr('data-source');
      const tgt      = d3.select(this).attr('data-target');
      const isFocused = src === datum.id || tgt === datum.id;
      const style    = e ? (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT) : EDGE_STYLE_DEFAULT;
      d3.select(this)
        .classed('edge-focused', isFocused)
        .classed('edge-faded',   !isFocused)
        .style('stroke-width', '1px')
        .attr('stroke', style.strokeMuted)  // all originals go muted
        .attr('marker-end', arrowMarkerId(e?.type, true));
    });
    /* Draw focused edges in top layer for z-order */
    drawFocusLayer(edges, connectedEdgeSet, datum.id, 150);
    /* edge-bg elements have datum bound via .datum(edgeDatum) in appendBgStripe */
    d3.selectAll('.edge-bg').each(function(e) {
      const isConn = e && (e.source === datum.id || e.target === datum.id);
      d3.select(this).style('opacity', isConn ? 0.5 : 0.03);
    });

    /* Edge labels: show connected ones at their current midpoint */
    d3.selectAll('.edge-label-g').each(function() {
      const src    = d3.select(this).attr('data-source');
      const tgt    = d3.select(this).attr('data-target');
      const isConn = src === datum.id || tgt === datum.id;
      d3.select(this).attr('opacity', isConn ? 1 : 0);
    });

  } else {
    /* ── RADIAL MODE: selected node moves to centre ────────────────── */

    /* Nodes */
    d3.selectAll('.node-g').each(function(d) {
      const isFocused  = connectedIds.has(d.id);
      const isSelected = d.id === datum.id;
      d3.select(this)
        .classed('faded',          !isFocused)
        .classed('highlighted',    isFocused)
        .classed('node-selected',  isSelected)
        .classed('node-connected', isFocused && !isSelected)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('transform', isSelected ? 'translate(0,0)' : `translate(${d.x},${d.y})`)
        .style('opacity', isFocused ? 1 : CONFIG.FADE_OPACITY);
      /* Restore circle to uniform radial radius */
      const node = nodeMap.get(d.id);
      if (node) {
        d3.select(this).select('circle.node-circle')
          .transition('focus').duration(DURATION).ease(ease)
          .attr('r', node.radius);
      }
    });

    /* Labels */
    const LABEL_GAP = 8, LABEL_LINE = 13;
    d3.selectAll('text.node-label').each(function() {
      const id        = d3.select(this).attr('data-label-for');
      const isFocused = connectedIds.has(id);
      const isCenter  = id === datum.id;
      const isPrev    = id === prevId;
      const ox        = +d3.select(this).attr('data-ox') || 0;
      const oy        = +d3.select(this).attr('data-oy') || 0;
      const node      = nodeMap.get(id);

      if (isCenter) {
        /* Selected node: reset transform to no rotation (horizontal text),
           show full text wrapped at 15 chars, aligned left of circle.    */
        const newX   = (node?.radius ?? CONFIG.NODE_RADIUS_BASE) + LABEL_GAP;
        const rawT   = d3.select(this).attr('data-raw-text') || (node?.name_th || id);
        const flines = wrapText(rawT, 15);
        const totalH = flines.length * LABEL_LINE;
        const startY = -totalH / 2 + LABEL_LINE / 2;

        d3.select(this)
          .attr('text-anchor', 'start')
          .attr('transform', 'translate(0,0) rotate(0)')  // at origin, no rotation
          .attr('opacity', 1)
          .attr('fill', cssVar('--text-primary'));

        d3.select(this).selectAll('tspan').remove();
        flines.forEach((line, li) => {
          d3.select(this).append('tspan')
            .attr('x', newX)
            .attr('y', startY + li * LABEL_LINE)
            .text(line);
        });
      } else if (isPrev) {
        /* Restore previous centre node label to rotated position */
        const rotateDeg2 = +d3.select(this).attr('data-rotate') || 0;
        const rawT2  = d3.select(this).attr('data-raw-text') || '';
        const label2 = truncateLabel(rawT2);
        const anchor2 = d3.select(this).attr('data-text-anchor') || 'start';
        d3.select(this)
          .attr('text-anchor', anchor2)
          .attr('transform', `translate(${ox},${oy}) rotate(${rotateDeg2})`);
        d3.select(this).selectAll('tspan').remove();
        d3.select(this).append('tspan')
          .attr('x', 0).attr('y', 0).text(label2);
        d3.select(this).transition('focus').duration(DURATION).ease(ease)
          .attr('opacity', isFocused ? 1 : 0.15).attr('fill', cssVar('--text-secondary'));
      } else {
        d3.select(this).transition('focus').duration(DURATION).ease(ease)
          .attr('opacity', isFocused ? 1 : 0.15).attr('fill', cssVar('--text-secondary'));
      }
    });

    /* Edges — move with the selected node, swap colour for focus/muted */
    d3.selectAll('.edge-path').each(function(e, i) {
      const isFocused = connectedEdgeSet.has(i);
      const sx = e.source === datum.id ? 0 : (nodeMap.get(e.source)?.x ?? 0);
      const sy = e.source === datum.id ? 0 : (nodeMap.get(e.source)?.y ?? 0);
      const tx = e.target === datum.id ? 0 : (nodeMap.get(e.target)?.x ?? 0);
      const ty = e.target === datum.id ? 0 : (nodeMap.get(e.target)?.y ?? 0);
      const ep = edgeEndpoints(sx, sy, tx, ty, nodeMap.get(e.target)?.radius);
      const style = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
      d3.select(this)
        .classed('edge-focused', isFocused)
        .classed('edge-faded',   !isFocused)
        .attr('stroke', style.strokeMuted)  // muted; focused drawn in top layer
        .attr('marker-end', arrowMarkerId(e.type, true))
        .transition('focus').duration(DURATION).ease(ease)
        .attr('x1', ep.x1).attr('y1', ep.y1)
        .attr('x2', ep.x2).attr('y2', ep.y2);
    });
    /* Draw focused edges in top layer */
    /* Delay = node movement duration so edges appear after node arrives */
    drawFocusLayer(edges, connectedEdgeSet, datum.id, DURATION);

    d3.selectAll('.edge-bg').each(function(e) {
      const isConn = e.source === datum.id || e.target === datum.id;
      const sx = e.source === datum.id ? 0 : (nodeMap.get(e.source)?.x ?? 0);
      const sy = e.source === datum.id ? 0 : (nodeMap.get(e.source)?.y ?? 0);
      const tx = e.target === datum.id ? 0 : (nodeMap.get(e.target)?.x ?? 0);
      const ty = e.target === datum.id ? 0 : (nodeMap.get(e.target)?.y ?? 0);
      d3.select(this)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('x1', sx).attr('y1', sy).attr('x2', tx).attr('y2', ty)
        .style('opacity', isConn ? 0.5 : 0.03);
    });

    /* Edge labels — animate to midpoint of the (possibly moved) edge */
    d3.selectAll('.edge-label-g').each(function() {
      const src    = d3.select(this).attr('data-source');
      const tgt    = d3.select(this).attr('data-target');
      const isConn = src === datum.id || tgt === datum.id;
      /* Node positions: selected node is now at (0,0) */
      const sx2 = src === datum.id ? 0 : (nodeMap.get(src)?.x ?? 0);
      const sy2 = src === datum.id ? 0 : (nodeMap.get(src)?.y ?? 0);
      const tx2 = tgt === datum.id ? 0 : (nodeMap.get(tgt)?.x ?? 0);
      const ty2 = tgt === datum.id ? 0 : (nodeMap.get(tgt)?.y ?? 0);
      const rrdx = tx2 - sx2, rrdy = ty2 - sy2;
      const rrlen = Math.sqrt(rrdx*rrdx + rrdy*rrdy) || 1;
      const rrux = rrdx/rrlen, rruy = rrdy/rrlen;
      const rawA2 = Math.atan2(rrdy, rrdx) * (180 / Math.PI);
      const isLeft2 = rawA2 > 90 || rawA2 < -90;
      const ang2 = isLeft2 ? rawA2 + 180 : rawA2;
      const midX2 = (sx2 + tx2) / 2, midY2 = (sy2 + ty2) / 2;
      const mx  = isLeft2 ? midX2 + rrux * 15 : midX2;
      const my  = isLeft2 ? midY2 + rruy * 15 : midY2;
      d3.select(this)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('transform', `translate(${mx},${my}) rotate(${ang2})`)
        .attr('opacity', isConn ? 1 : 0);
    });
  }

  updateRightPanel(datum, edges);
}

/**
 * clearSelection(nodes, edges)
 * RADIAL: animate selected node back to orbit.
 * GRID:   just remove highlight classes, no movement.
 */
function clearSelection(nodes, edges) {
  const prevId = selectedId;
  selectedId   = null;

  const DURATION = 400;
  const ease     = d3.easeCubicInOut;

  /* Fully reset ALL visual state — classes, inline styles, strokes */
  d3.selectAll('.node-g').each(function(d) {
    const node = nodeMap.get(d.id);
    d3.select(this)
      .classed('faded highlighted node-selected node-connected', false)
      .interrupt('focus')
      .style('opacity', null);        // remove any inline opacity
    this.style.removeProperty('opacity'); // belt + suspenders

    /* Reset circle stroke to default location colour, remove any ring */
    d3.select(this).select('circle.node-circle')
      .interrupt('focus')
      .attr('stroke', node ? locationColor(node.register_location) : '#888880')
      .attr('stroke-width', 1.5);
  });

  clearFocusLayer(); // remove focused edge duplicates from top layer
  d3.selectAll('.edge-path')
    .classed('edge-focused edge-faded', false)
    .style('stroke-width', '1.5px');

  d3.selectAll('.edge-bg')
    .interrupt('focus')
    .style('opacity', null)
    .attr('opacity', null);

  d3.selectAll('text.node-label')
    .interrupt('focus')
    .attr('opacity', 1)
    .attr('fill', cssVar('--text-secondary'));

  d3.selectAll('.edge-label-g').attr('opacity', 0);

  if (currentLayout === 'grid') {
    /* GRID: restore edge to muted colour (no opacity change) */
    d3.selectAll('.edge-path').each(function(e) {
      if (e) {
        const style = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
        d3.select(this)
          .attr('stroke', style.strokeMuted || style.stroke)
          .attr('marker-end', arrowMarkerId(e.type, true))
          .style('stroke-width', '1.5px');
      } else {
        d3.select(this).style('stroke-width', '1.5px');
      }
    });
    /* Just restore label positions to their grid locations */
    const LABEL_GAP = 8, LABEL_LINE = 13;
    d3.selectAll('text.node-label').each(function() {
      const id   = d3.select(this).attr('data-label-for');
      const node = nodeMap.get(id);
      if (!node) return;
      /* Grid: label below node, centre-aligned, 16px gap, wrapped at 60px */
      const GRID_GAP  = 16;
      const GRID_FONT = 10;
      const nx = node.gxPx;
      const ny = node.gyPx + (node.gridRadius || node.radius) + GRID_GAP;
      const rawText   = d3.select(this).attr('data-raw-text') ||
                        d3.select(this).selectAll('tspan').nodes()
                          .map(t => t.textContent).join(' ');
      d3.select(this).attr('data-raw-text', rawText);
      const newLines  = wrapTextPx(rawText, 87, GRID_FONT);
      d3.select(this).selectAll('tspan').remove();
      newLines.forEach((line, li) => {
        d3.select(this).append('tspan')
          .attr('x', nx)
          .attr('y', ny + li * LABEL_LINE)
          .text(line);
      });
      d3.select(this).attr('text-anchor', 'middle');
    });

  } else {
    /* RADIAL: animate all nodes back to their orbit positions.
       Also restore circle radius to node.radius (uniform in radial)
       in case a prior grid visit left it at GRID_NODE_RADIUS.      */
    d3.selectAll('.node-g').each(function(d) {
      const node = nodeMap.get(d.id);
      if (!node) return;
      d3.select(this)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('transform', `translate(${d.x},${d.y})`);
      /* Restore circle size */
      d3.select(this).select('circle.node-circle')
        .transition('focus').duration(DURATION).ease(ease)
        .attr('r', node.radius);
      /* Restore clip-path and image size */
      const uid = `clip-${d.id.replace(/[^a-z0-9]/gi, '_')}`;
      d3.select(`#${uid} circle`)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('r', node.radius - 1);
      d3.select(this).select('image')
        .transition('focus').duration(DURATION).ease(ease)
        .attr('x', -(node.radius - 1)).attr('y', -(node.radius - 1))
        .attr('width', (node.radius - 1) * 2).attr('height', (node.radius - 1) * 2);
    });

    /* Restore edges to original positions and active colour */
    d3.selectAll('.edge-path').each(function(e) {
      const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
      const ep = edgeEndpoints(s?.x ?? 0, s?.y ?? 0, t?.x ?? 0, t?.y ?? 0, t?.radius);
      const style = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
      d3.select(this)
        .attr('stroke', style.strokeMuted || style.stroke)
        .attr('marker-end', arrowMarkerId(e.type, true))
        .transition('focus').duration(DURATION).ease(ease)
        .attr('x1', ep.x1).attr('y1', ep.y1)
        .attr('x2', ep.x2).attr('y2', ep.y2);
    });

    d3.selectAll('.edge-bg').each(function(e) {
      const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
      d3.select(this)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('x1', s?.x ?? 0).attr('y1', s?.y ?? 0)
        .attr('x2', t?.x ?? 0).attr('y2', t?.y ?? 0);
    });

    /* Restore labels to radial positions */
    const LABEL_LINE = 13;
    d3.selectAll('text.node-label').each(function() {
      /* Radial restore: truncated label at original rotated transform */
      const ox        = +d3.select(this).attr('data-ox') || 0;
      const oy        = +d3.select(this).attr('data-oy') || 0;
      const rotateDeg = +d3.select(this).attr('data-rotate') || 0;
      const id        = d3.select(this).attr('data-label-for');
      const node      = nodeMap.get(id);
      if (!node) return;
      const rawT   = d3.select(this).attr('data-raw-text') || '';
      const label  = truncateLabel(rawT);
      /* Restore correct text-anchor (left-half nodes use 'end') */
      const storedAnchor = d3.select(this).attr('data-text-anchor') || 'start';
      d3.select(this)
        .interrupt('focus')
        .attr('text-anchor', storedAnchor)
        .attr('transform', `translate(${ox},${oy}) rotate(${rotateDeg})`);
      d3.select(this).selectAll('tspan').remove();
      d3.select(this).append('tspan')
        .attr('x', 0).attr('y', 0).text(label);
    });

    /* Restore edge label positions */
    d3.selectAll('.edge-label-g').each(function() {
      const src = d3.select(this).attr('data-source');
      const tgt = d3.select(this).attr('data-target');
      const s = nodeMap.get(src), t = nodeMap.get(tgt);
      const mx = ((s?.x ?? 0) + (t?.x ?? 0)) / 2;
      const my = ((s?.y ?? 0) + (t?.y ?? 0)) / 2;
      let angleDeg = Math.atan2((t?.y ?? 0) - (s?.y ?? 0), (t?.x ?? 0) - (s?.x ?? 0)) * (180 / Math.PI);
      if (angleDeg > 90 || angleDeg < -90) angleDeg += 180;
      d3.select(this)
        .transition('focus').duration(DURATION).ease(ease)
        .attr('transform', `translate(${mx},${my}) rotate(${angleDeg})`);
    });
  }

  document.getElementById('right-placeholder').style.display = '';
  document.getElementById('node-detail').classList.remove('visible');
}

/**
 * updateRightPanel(node, edges)
 * Populates the right-side detail panel with node info + connections.
 */
function updateRightPanel(node, edges) {
  /* Show detail, hide placeholder */
  document.getElementById('right-placeholder').style.display = 'none';
  document.getElementById('node-detail').classList.add('visible');

  /* Avatar — background matches node type appearance */
  const avatarEl = document.getElementById('nd-avatar');
  const nodeType = (node.type || '').toLowerCase();
  const avatarBg = nodeType === 'person'
    ? cssVar('--people')
    : nodeType === 'government agency'
    ? '#ffffff'
    : locationColor(node.register_location || '');
  avatarEl.style.background = avatarBg;
  if (node.image_name) {
    const rawAvatar = (node.image_name || '').trim().replace(/^images\//, '');
    const avatarExt = rawAvatar.includes('.') ? rawAvatar : `${rawAvatar}.png`;
    avatarEl.src = `images/${avatarExt}?v=${IMAGE_CACHE_BUST}`;
    avatarEl.onerror = () => { avatarEl.style.display = 'none'; };
    avatarEl.style.display = '';
  } else {
    avatarEl.style.display = 'none';
  }

  /* Names */
  const nameTh = node.name_th || '';
  const nameEn = node.id || '';
  const nameThEl = document.getElementById('nd-name-th');
  const nameEnEl = document.getElementById('nd-name-en');
  nameThEl.textContent = nameTh || nameEn;
  /* Only show English name if it differs from Thai name */
  if (!nameTh || nameTh === nameEn) {
    nameEnEl.textContent = '';
    nameEnEl.style.display = 'none';
  } else {
    nameEnEl.textContent = nameEn;
    nameEnEl.style.display = '';
  }

  /* Attributes */
  const attrs = [
    { label: 'Registered in',        value: node.register_location },
    { label: 'Date of<br>incorporation', value: (() => {
        const raw = node.date_of_incorporation;
        if (!raw) return '';
        const d = new Date(raw);
        if (isNaN(d)) return raw; // return as-is if unparseable
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      })() },
    { label: 'Status',       value: node.status },
    { label: 'Group',        value: node.group },
  ].filter(a => a.value);

  const attrsEl = document.getElementById('nd-attrs');
  attrsEl.innerHTML = attrs.map(a =>
    `<div class="attr-row">
      <span class="attr-label">${a.label}</span>
      <span class="attr-value">${a.value}</span>
    </div>`
  ).join('');

  /* Note */
  const noteWrap = document.getElementById('nd-note-wrap');
  if (node.note) {
    document.getElementById('nd-note').textContent = node.note;
    noteWrap.style.display = '';
  } else {
    noteWrap.style.display = 'none';
  }

  /* Connections list */
  const conns = edges.filter(e => e.source === node.id || e.target === node.id);
  document.getElementById('nd-conn-count').textContent = conns.length;

  /* Group order for relationship types */
  const CONN_TYPE_ORDER = [
    'shareholding',
    'Past shareholding',
    'Non-shareholding/control relationship',
    'Past relationship',
  ];
  const CONN_TYPE_LABEL = {
    'shareholding':                          'Shareholding',
    'Past shareholding':                     'Past Shareholding',
    'Non-shareholding/control relationship': 'Non-shareholding',
    'Past relationship':                     'Past Non-shareholding',
  };

  function buildConnCard(e, node) {
    const otherId   = e.source === node.id ? e.target : e.source;
    const other     = nodeMap.get(otherId);
    const dir       = e.source === node.id ? '→' : '←';
    const edgeStyle = EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT;
    const textColor = edgeStyle.stroke;
    const rawName   = (other?.image_name || '').trim().replace(/^images\//, '');
    const imgFile   = rawName ? (rawName.includes('.') ? rawName : rawName + '.png') : '';
    /* Avatar background matches node appearance by type */
    const otherType = (other?.type || '').toLowerCase();
    const avatarBg  = otherType === 'person'
      ? cssVar('--people')
      : otherType === 'government agency'
      ? '#ffffff'
      : locationColor(other?.register_location || '');
    const avatarHtml = imgFile
      ? `<img class="conn-item-avatar" src="images/${imgFile}?v=${IMAGE_CACHE_BUST}"
             style="background:${avatarBg}"
             onerror="this.style.display='none';this.nextSibling.style.display='flex'"
             alt="" />
         <div class="conn-item-avatar-placeholder" style="display:none;background:${avatarBg}">
           ${(other?.name_th || otherId).charAt(0)}
         </div>`
      : `<div class="conn-item-avatar-placeholder" style="background:${avatarBg}">
           ${(other?.name_th || otherId).charAt(0)}
         </div>`;
    return `<div class="conn-item" data-id="${otherId}">
      <div class="conn-item-header">
        <div class="conn-item-text-group">
          <div class="conn-item-name">${dir} ${other?.name_th || otherId}</div>
          ${e.detail ? `<div class="conn-item-detail" style="color:${textColor}">${e.detail}</div>` : ''}
          ${e.amount ? `<div class="conn-item-amount" style="color:${textColor}">${e.amount.toLocaleString()} shares</div>` : ''}
        </div>
        ${avatarHtml}
      </div>
    </div>`;
  }

  /* Group connections by type */
  const grouped = {};
  conns.forEach(e => {
    const key = e.type || 'Non-shareholding/control relationship';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(e);
  });

  const connList = document.getElementById('nd-conn-list');
  connList.innerHTML = CONN_TYPE_ORDER
    .filter(type => grouped[type]?.length)
    .map(type => {
      const items     = grouped[type];
      const style     = EDGE_STYLES[type] || EDGE_STYLE_DEFAULT;
      const pillBg    = style.strokeMuted || style.stroke;
      const pillText  = style.stroke;
      const label     = CONN_TYPE_LABEL[type] || type;
      const cards     = items.map(e => buildConnCard(e, node)).join('');
      return `<div class="conn-type-group">
        <div class="conn-type-header">
          <span class="conn-type-pill" style="background:${pillBg};color:${pillText}">${label}</span>
          <span class="conn-type-count">${items.length}</span>
        </div>
        ${cards}
      </div>`;
    }).join('');

  /* Clicking a connection item focuses that node */
  connList.querySelectorAll('.conn-item').forEach(el => {
    el.addEventListener('click', () => {
      const id  = el.dataset.id;
      const n   = nodeMap.get(id);
      if (n) onNodeClick(n, [...nodeMap.values()], edgeData);
    });
  });
}

   7. SEARCH BAR
══════════════════════════════════════════════════════════════ */

let searchActiveTab = 'people'; // 'people' | 'companies'

function initSearch(nodes) {
  const input    = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');
  const results  = document.getElementById('search-results');
  const tabs     = document.querySelectorAll('.search-tab');
  const clearBtn = document.getElementById('search-clear');

  /* Show/hide clear button based on input content */
  input.addEventListener('input', () => {
    clearBtn.style.display = input.value ? 'block' : 'none';
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    dropdown.classList.remove('visible');
    input.focus();
  });

  /* Tab switching */
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      searchActiveTab = tab.dataset.tab;
      renderSearchResults(input.value, nodes);
    });
  });

  /* Input handler */
  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (q.length === 0) {
      dropdown.classList.remove('visible');
      return;
    }
    dropdown.classList.add('visible');
    renderSearchResults(q, nodes);
  });

  /* Close on outside click */
  document.addEventListener('click', e => {
    if (!document.getElementById('search-container').contains(e.target)) {
      dropdown.classList.remove('visible');
    }
  });
}

function renderSearchResults(query, nodes) {
  const results  = document.getElementById('search-results');
  const q        = query.toLowerCase();

  /* Filter by tab and query */
  const typeFilter = searchActiveTab === 'people' ? 'person' : 'company';
  const matched = nodes
    .filter(n => n.type === typeFilter || (searchActiveTab === 'companies' && n.type === 'government agency'))
    .filter(n => n.id.toLowerCase().includes(q) || n.name_th.toLowerCase().includes(q))
    .sort((a, b) => (a.name_th || a.id).localeCompare(b.name_th || b.id));

  if (matched.length === 0) {
    results.innerHTML = '<div class="search-empty">No results found</div>';
    return;
  }

  results.innerHTML = matched.map(n =>
    `<div class="search-result" data-id="${n.id}">${n.name_th || n.id}</div>`
  ).join('');

  /* On result click — focus the node */
  results.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const n = nodeMap.get(el.dataset.id);
      if (n) {
        onNodeClick(n, [...nodeMap.values()], edgeData);
        document.getElementById('search-input').value = n.name_th || n.id;
        document.getElementById('search-dropdown').classList.remove('visible');
      }
    });
  });
}
