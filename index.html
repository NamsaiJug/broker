/**
 * drawEdgesRadial(edges)
 * Draws standard straight <line> edges (existing radial style).
 * Uses nodeMap.x / nodeMap.y for positions.
 */
function drawEdgesRadial(edges, g_edge_bg, g_edges_grp) {
  /* Background stripes for shareholding */
  g_edge_bg.selectAll('line.edge-bg')
    .data(edges.filter(e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).bg))
    .join('line')
    .attr('class', 'edge-bg')
    .attr('x1', e => nodeMap.get(e.source)?.x ?? 0)
    .attr('y1', e => nodeMap.get(e.source)?.y ?? 0)
    .attr('x2', e => nodeMap.get(e.target)?.x ?? 0)
    .attr('y2', e => nodeMap.get(e.target)?.y ?? 0)
    .attr('stroke', e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).strokeMuted)
    .attr('stroke-opacity', 0.5)
    .attr('stroke-width', e => clamp((e.amount / 5e6) * 20, 2, 40))
    .attr('pointer-events', 'none');

  /* Main edge lines */
  g_edges_grp.selectAll('line.edge-path')
    .data(edges)
    .join('line')
    .attr('class', 'edge-path')
    .attr('data-source', e => e.source)
    .attr('data-target', e => e.target)
    .each(function(e) {
      const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
      const ep = edgeEndpoints(s?.x ?? 0, s?.y ?? 0, t?.x ?? 0, t?.y ?? 0, t?.radius);
      d3.select(this)
        .attr('x1', ep.x1).attr('y1', ep.y1)
        .attr('x2', ep.x2).attr('y2', ep.y2);
    })
    .attr('stroke', e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).strokeMuted)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', e => (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).dash)
    .attr('marker-end', e => arrowMarkerId(e.type, true))
    .on('click', e => e.stopPropagation())
    .on('mouseenter', function() { d3.select(this).classed('edge-hovered', true); })
    .on('mouseleave', function() { d3.select(this).classed('edge-hovered', false); });
}

/**
 * drawEdgesGrid(edges)
 * Draws orthogonal <path> edges (circuit-diagram style).
 * Uses nodeMap.gxPx / nodeMap.gyPx for positions.
 * Parallel edges between the same pair of nodes get a small
 * horizontal jitter so they don't fully overlap.
 */
/* ══════════════════════════════════════════════════════════════
   CIRCUIT-STYLE EDGE ROUTING  (trunk → branch)
   ─────────────────────────────────────────────────────────────
   Per source node:
   1. Group outgoing edges by dominant direction (R/L/D/U).
   2. Draw a shared trunk outward from source node edge.
   3. Fan branches with perpendicular offsets at trunk tip.
   4. Route each branch orthogonally to target (H→V→H or V→H→V).
   5. Shorten last segment by node radius so arrow lands cleanly.

   Uniform node size: all grid nodes use CONFIG.GRID_NODE_RADIUS.
══════════════════════════════════════════════════════════════ */

function drawEdgesGrid(edges, g_edge_bg, g_edges_grp) {
  /* NR used for trunk/clearance — use average person radius as base */
  const NR          = 17.5; // approx person/gov radius for trunk spacing
  const TRUNK_LEN   = NR + 16;                  // trunk extends past node edge
  const EDGE_OFFSET = 24;                        // px between parallel branches

  /* ── Direction grouping ─────────────────────────────────────── */
  function directionKey(sx, sy, tx, ty) {
    const dx = tx - sx, dy = ty - sy;
    if (Math.abs(dx) >= Math.abs(dy)) return dx >= 0 ? 'R' : 'L';
    return dy >= 0 ? 'D' : 'U';
  }

  /* Compute an offset index for each edge based on TWO groupings:
     1. Same SOURCE + same direction → fan out from the shared trunk
     2. Same TARGET + same incoming direction → fan out before arriving

     We assign each edge a final offset that accounts for BOTH groupings.
     Strategy: first pass builds source-groups and assigns an offset per
     edge. Second pass builds target-groups and, for edges in a target
     group of size > 1, adds an additional perpendicular offset so that
     edges arriving at the same node from the same direction are spread. */

  /* Map: edge → { srcOffset, tgtOffset, dir } */
  const edgeMeta = new Map();

  /* Pass 1: source grouping → compute per-source offsets */
  const sourceGroups = new Map();
  edges.forEach(e => {
    const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
    if (!s || !t || s.gxPx === undefined || t.gxPx === undefined) return;
    const dir = directionKey(s.gxPx, s.gyPx, t.gxPx, t.gyPx);
    if (!sourceGroups.has(e.source)) sourceGroups.set(e.source, new Map());
    const dm = sourceGroups.get(e.source);
    if (!dm.has(dir)) dm.set(dir, []);
    dm.get(dir).push({ edge: e, s, t, dir });
    edgeMeta.set(e, { dir, srcIdx: 0, srcTotal: 1, tgtIdx: 0, tgtTotal: 1 });
  });

  /* Assign source group indices */
  sourceGroups.forEach(dirMap => {
    dirMap.forEach(items => {
      items.forEach(({ edge }, idx) => {
        const m = edgeMeta.get(edge);
        if (m) { m.srcIdx = idx; m.srcTotal = items.length; }
      });
    });
  });

  /* Pass 2: target grouping → incoming direction = opposite of travel dir */
  const targetGroups = new Map();
  edgeMeta.forEach((meta, e) => {
    const key = e.target + '||' + meta.dir; // group by target + direction
    if (!targetGroups.has(key)) targetGroups.set(key, []);
    targetGroups.get(key).push(e);
  });

  /* Assign target group indices */
  targetGroups.forEach(group => {
    group.forEach((e, idx) => {
      const m = edgeMeta.get(e);
      if (m) { m.tgtIdx = idx; m.tgtTotal = group.length; }
    });
  });

  /* ── Append helpers ─────────────────────────────────────────── */
  function appendEdgePath(grp, edgeDatum, pathD) {
    const style = EDGE_STYLES[edgeDatum.type] || EDGE_STYLE_DEFAULT;
    grp.append('path')
      .datum(edgeDatum)
      .attr('class', 'edge-path')
      .attr('data-source', edgeDatum.source)
      .attr('data-target', edgeDatum.target)
      .attr('fill', 'none')
      .attr('stroke', style.strokeMuted || style.stroke)
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', style.dash || null)
      .attr('marker-end', arrowMarkerId(edgeDatum.type, true))  // muted by default
      .attr('d', pathD)
      .on('click', e => e.stopPropagation())
      .on('mouseenter', function() { d3.select(this).classed('edge-hovered', true); })
      .on('mouseleave', function() { d3.select(this).classed('edge-hovered', false); });
  }

  function appendBgStripe(grp, edgeDatum, pathD) {
    const style = EDGE_STYLES[edgeDatum.type] || EDGE_STYLE_DEFAULT;
    if (!style.bg) return;
    grp.append('path')
      .datum(edgeDatum)
      .attr('class', 'edge-bg')
      .attr('fill', 'none')
      .attr('stroke', style.strokeMuted || style.bg)
      .attr('stroke-opacity', 0.5)
      .attr('stroke-width', clamp((edgeDatum.amount / 5e6) * 20, 2, 40))
      .attr('pointer-events', 'none')
      .attr('d', pathD);
  }

  /* ── Main render loop ───────────────────────────────────────── */
  sourceGroups.forEach((dirMap, sourceId) => {
    dirMap.forEach((items, dir) => {
      const { s } = items[0];
      const sx = s.gxPx, sy = s.gyPx;

      /* Trunk tip: past source node edge in dominant direction */
      let ttx = sx, tty = sy;
      if      (dir === 'R') ttx = sx + TRUNK_LEN;
      else if (dir === 'L') ttx = sx - TRUNK_LEN;
      else if (dir === 'D') tty = sy + TRUNK_LEN;
      else if (dir === 'U') tty = sy - TRUNK_LEN;

      items.forEach(({ edge, s: src, t }, idx) => {
        const tx = t.gxPx, ty = t.gyPx;
        const meta = edgeMeta.get(edge) || { srcIdx: idx, srcTotal: items.length, tgtIdx: 0, tgtTotal: 1 };

        /* Combine source AND target group offsets:
           - srcOffset fans edges from the same source/direction
           - tgtOffset fans edges arriving at the same target/direction
           Both are centred (idx - (total-1)/2) × EDGE_OFFSET               */
        const srcOffset = (meta.srcIdx - (meta.srcTotal - 1) / 2) * EDGE_OFFSET;
        const tgtOffset = (meta.tgtIdx - (meta.tgtTotal - 1) / 2) * EDGE_OFFSET;
        /* Use the larger of the two offsets so branches don't collapse */
        const offset = Math.abs(srcOffset) >= Math.abs(tgtOffset) ? srcOffset : tgtOffset;
        let bx = ttx, by = tty;
        if (dir === 'R' || dir === 'L') by = tty + offset;
        else                             bx = ttx + offset;

        /* Arrow clearance from target node edge */
        const clearance = NR + 3;
        let pathD;

        if (dir === 'R' || dir === 'L') {
          if (Math.abs(ty - by) < 2) {
            /* Same row: M src → branch → horizontal to target */
            const signX = tx >= bx ? 1 : -1;
            const endX  = tx - signX * clearance;
            pathD = `M ${sx} ${sy} L ${bx} ${by} L ${endX} ${ty}`;
          } else {
            /* Vertical jog needed: H → V → H */
            const midX  = (bx + tx) / 2;
            const signX = tx >= midX ? 1 : -1;
            const endX  = tx - signX * clearance;
            pathD = `M ${sx} ${sy} L ${bx} ${by} L ${midX} ${by} L ${midX} ${ty} L ${endX} ${ty}`;
          }
        } else {
          if (Math.abs(tx - bx) < 2) {
            /* Same column: M src → branch → vertical to target */
            const signY = ty >= by ? 1 : -1;
            const endY  = ty - signY * clearance;
            pathD = `M ${sx} ${sy} L ${bx} ${by} L ${tx} ${endY}`;
          } else {
            /* Horizontal jog needed: V → H → V */
            const midY  = (by + ty) / 2;
            const signY = ty >= midY ? 1 : -1;
            const endY  = ty - signY * clearance;
            pathD = `M ${sx} ${sy} L ${bx} ${by} L ${bx} ${midY} L ${tx} ${midY} L ${tx} ${endY}`;
          }
        }

        appendEdgePath(g_edges_grp, edge, pathD);
        appendBgStripe(g_edge_bg,   edge, pathD);
      });
    });
  });
}

/**
 * drawEdgeLabelsForLayout(edges, gEdgeLabels)
 * Renders edge label groups at the midpoint of each edge.
 * Works for both layouts — reads gxPx/gyPx in grid mode, x/y in radial.
 */
function drawEdgeLabelsForLayout(edges, gEdgeLabels) {
  /* ── Edge label overlap avoidance ─────────────────────────────────
     Strategy:
     1. Compute the natural anchor position for every label.
     2. Group labels whose anchors are within CLUSTER_DIST px of each
        other — these would overlap.
     3. Within each cluster, spread labels perpendicular to the edge
        direction by SPREAD_STEP px per label, centred on the group.
     4. Render each label at its adjusted position.

     This handles the common case of multiple edges arriving at the
     same target node from similar directions.                        */

  const ARROWHEAD_SPACE = 15;  // px from tip to label anchor
  const FONT_SIZE       = 10;
  const LINE_H          = 13;
  const CLUSTER_DIST    = 20;  // px — anchors closer than this are "clustered"
  const SPREAD_STEP     = LINE_H + 2; // px between labels in a cluster
  const isGrid          = currentLayout === 'grid';

  gEdgeLabels.selectAll('g.edge-label-g').remove();

  const labelEdges = edges.filter(e => e.detail || e.amount);
  if (labelEdges.length === 0) return;

  /* ── Step 1: compute natural anchor for each edge ─────────────── */
  const labelMeta = labelEdges.map(e => {
    const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
    if (!s || !t) return null;

    const sx = isGrid ? (s.gxPx ?? 0) : (s.x ?? 0);
    const sy = isGrid ? (s.gyPx ?? 0) : (s.y ?? 0);
    const tx = isGrid ? (t.gxPx ?? 0) : (t.x ?? 0);
    const ty = isGrid ? (t.gyPx ?? 0) : (t.y ?? 0);
    if (sx === tx && sy === ty) return null;

    let anchorX, anchorY, angleDeg, textAnchor, perpX = 0, perpY = 0;

    if (!isGrid) {
      /* RADIAL: midpoint, shifted for leftward lines */
      const dx = tx - sx, dy = ty - sy;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const ux = dx/len, uy = dy/len;
      const rawA = Math.atan2(dy, dx) * (180 / Math.PI);
      const isLeft = rawA > 90 || rawA < -90;
      angleDeg  = isLeft ? rawA + 180 : rawA;
      textAnchor = 'middle';
      const midX = (sx + tx) / 2, midY = (sy + ty) / 2;
      anchorX = isLeft ? midX + ux * ARROWHEAD_SPACE : midX;
      anchorY = isLeft ? midY + uy * ARROWHEAD_SPACE : midY;
      /* Perpendicular direction for spreading: rotate 90° from travel */
      perpX = -uy; perpY = ux;

    } else {
      /* GRID: near arrowhead on final segment.
         Use target node's actual gridRadius (type-based) for clearance. */
      const dx = tx - sx, dy = ty - sy;
      const tNodeG  = nodeMap.get(e.target);
      const NR      = (tNodeG?.gridRadius || tNodeG?.radius || 14);
      const clearance = NR + 3;
      const isH = Math.abs(dx) >= Math.abs(dy);

      if (isH) {
        const signX = dx >= 0 ? 1 : -1;
        const endX  = tx - signX * clearance;
        anchorX = endX - signX * ARROWHEAD_SPACE;
        anchorY = ty;
        angleDeg   = 0;
        textAnchor = signX >= 0 ? 'end' : 'start';
        /* Perpendicular to horizontal = vertical */
        perpX = 0; perpY = 1;
      } else {
        const signY = dy >= 0 ? 1 : -1;
        const endY  = ty - signY * clearance;
        anchorX = tx;
        anchorY = endY - signY * ARROWHEAD_SPACE;
        angleDeg   = 90;
        textAnchor = signY >= 0 ? 'end' : 'start';
        /* Perpendicular to vertical = horizontal (in rotated space) */
        perpX = 1; perpY = 0;
      }
    }

    const parts = [];
    if (e.amount) parts.push({ txt: e.amount.toLocaleString() + ' shares', bold: true });
    if (e.detail) wrapText(e.detail, 30).forEach(l => parts.push({ txt: l, bold: false }));

    return { e, anchorX, anchorY, angleDeg, textAnchor, perpX, perpY,
             parts, spreadOffset: 0 };
  }).filter(Boolean);

  /* ── Step 2: cluster nearby anchors and spread them apart ──────── */
  const used = new Array(labelMeta.length).fill(false);

  for (let i = 0; i < labelMeta.length; i++) {
    if (used[i]) continue;
    const cluster = [i];
    for (let j = i + 1; j < labelMeta.length; j++) {
      if (used[j]) continue;
      const a = labelMeta[i], b = labelMeta[j];
      const dist = Math.sqrt((a.anchorX - b.anchorX)**2 + (a.anchorY - b.anchorY)**2);
      /* Only cluster labels that share the same angle (same direction) */
      if (dist < CLUSTER_DIST && Math.abs(a.angleDeg - b.angleDeg) < 5) {
        cluster.push(j);
        used[j] = true;
      }
    }
    used[i] = true;

    if (cluster.length > 1) {
      /* Spread cluster members perpendicular to travel direction */
      const total = cluster.length;
      cluster.forEach((idx, rank) => {
        const m = labelMeta[idx];
        const offset = (rank - (total - 1) / 2) * SPREAD_STEP;
        m.spreadOffset = offset;
      });
    }
  }

  /* ── Step 3: render each label at its final position ───────────── */
  labelMeta.forEach(({ e, anchorX, anchorY, angleDeg, textAnchor,
                       perpX, perpY, parts, spreadOffset }) => {
    /* Apply perpendicular spread offset */
    const finalX = anchorX + perpX * spreadOffset;
    const finalY = anchorY + perpY * spreadOffset;

    const color = (EDGE_STYLES[e.type] || EDGE_STYLE_DEFAULT).stroke;
    const grp   = gEdgeLabels.append('g')
      .attr('class', 'edge-label-g')
      .attr('data-source', e.source)
      .attr('data-target', e.target)
      .attr('pointer-events', 'none')
      .attr('opacity', 0)
      .attr('transform', `translate(${finalX},${finalY}) rotate(${angleDeg})`);

    const totalH = parts.length * LINE_H;
    parts.forEach(({ txt, bold }, li) => {
      const dyVal = -totalH / 2 + li * LINE_H + LINE_H / 2;
      grp.append('text')
        .attr('text-anchor',       textAnchor)
        .attr('dominant-baseline', 'middle')
        .attr('dy',                dyVal)
        .attr('font-size',         FONT_SIZE)
        .attr('font-weight',       bold ? '700' : 'normal')
        .attr('font-family',       "'IBM Plex Sans Thai Looped', sans-serif")
        .attr('fill',              color)
        .attr('stroke', cssVar('--bg'))
        .attr('stroke-width',      3)
        .attr('stroke-linejoin',   'round')
        .attr('paint-order',       'stroke fill')
        .text(txt);
    });
  });
}


/* ══════════════════════════════════════════════════════════════
   13. LAYOUT SWITCHER
   switchLayout(targetLayout, nodes, edges)
   Animates all nodes and edges from current layout to target.
   Redraws edges as <line> (radial) or <path> (grid).
══════════════════════════════════════════════════════════════ */

async function switchLayout(targetLayout, nodes, edges) {
  if (targetLayout === currentLayout) return;

  /* ── Step 1: Compute grid positions (only once — cached on node datums) ──
     gxPx/gyPx are written directly onto each node object. Since nodes[]
     is the same array reference throughout the session, positions persist
     across layout switches. We only recompute on the very first switch.   */
  if (targetLayout === 'grid' && !nodes.some(n => isFinite(n.gxPx))) {
    setOverlay(true, 'Computing grid layout…');
    const svgEl = document.getElementById('graph-svg');
    await computeClusteredGridLayout(nodes, edges, svgEl.clientWidth, svgEl.clientHeight);
    setOverlay(false);
  }

  currentLayout = targetLayout;
  const DURATION = 700;
  const ease     = d3.easeCubicInOut;

  /* ── Step 2: Instant-clear any active selection ── */
  clearFocusLayer();
  selectedId = null;
  d3.selectAll('.node-g')
    .classed('faded highlighted node-selected node-connected', false)
    .style('opacity', 1);
  d3.selectAll('.edge-path').classed('edge-focused edge-faded', false);
  d3.selectAll('.edge-label-g').attr('opacity', 0);
  d3.selectAll('text.node-label').attr('opacity', 1).attr('fill', cssVar('--text-secondary'));
  document.getElementById('right-placeholder').style.display = '';
  document.getElementById('node-detail').classList.remove('visible');

  /* ── Step 3: Reset zoom so grid coordinates land at screen centre ── */
  const svgEl2 = document.getElementById('graph-svg');
  const w = svgEl2.clientWidth, h = svgEl2.clientHeight;
  d3.select('#graph-svg')
    .call(ZOOM.transform, d3.zoomIdentity.translate(w / 2, h / 2));

  /* ── Step 4: Animate nodes to new positions + uniform size in grid ── */
  d3.selectAll('.node-g').each(function(d) {
    const node = nodeMap.get(d.id);
    if (!node) return;
    const tx = targetLayout === 'grid' ? node.gxPx : node.x;
    const ty = targetLayout === 'grid' ? node.gyPx : node.y;
    const nr = targetLayout === 'grid' ? (node.gridRadius || node.radius) : node.radius;

    d3.select(this)
      .transition('layout').duration(DURATION).ease(ease)
      .attr('transform', `translate(${tx},${ty})`);

    /* Animate circle radius between radial (variable) and grid (uniform) */
    d3.select(this).select('circle.node-circle')
      .transition('layout').duration(DURATION).ease(ease)
      .attr('r', nr);

    /* Also resize the clip-path circle and image for image nodes */
    const uid = `clip-${d.id.replace(/[^a-z0-9]/gi, '_')}`;
    d3.select(`#${uid} circle`)
      .transition('layout').duration(DURATION).ease(ease)
      .attr('r', nr - 1);
    d3.select(this).select('image')
      .transition('layout').duration(DURATION).ease(ease)
      .attr('x', -(nr - 1)).attr('y', -(nr - 1))
      .attr('width',  (nr - 1) * 2)
      .attr('height', (nr - 1) * 2);
  });

  /* ── Step 5: Animate labels to new positions ── */
  const LABEL_GAP = 8, LABEL_LINE = 13;
  d3.selectAll('text.node-label').each(function() {
    const id   = d3.select(this).attr('data-label-for');
    const node = nodeMap.get(id);
    if (!node) return;
    const tspans = d3.select(this).selectAll('tspan');
    const count  = tspans.size();

    if (targetLayout === 'grid') {
      /* Grid: NO rotation, label below node, centre-aligned.
         Reset transform to remove any radial rotation first.          */
      const GRID_GAP  = 16;
      const GRID_FONT = 10;
      const nx = node.gxPx;
      const ny = node.gyPx + (node.gridRadius || node.radius) + GRID_GAP;
      const rawText  = d3.select(this).attr('data-raw-text') ||
                       tspans.nodes().map(t => t.textContent).join(' ');
      d3.select(this).attr('data-raw-text', rawText);
      const newLines = wrapTextPx(rawText, 87, GRID_FONT);
      /* Remove rotation by setting transform to identity */
      d3.select(this)
        .attr('transform', null)  // no rotation in grid view
        .attr('text-anchor', 'middle');
      d3.select(this).selectAll('tspan').remove();
      newLines.forEach((line, li) => {
        d3.select(this).append('tspan')
          .attr('x', nx)
          .attr('y', ny + li * LABEL_LINE)
          .text(line);
      });
    } else {
      /* Radial restore: truncated label with original rotation transform */
      const ox        = +d3.select(this).attr('data-ox') || 0;
      const oy        = +d3.select(this).attr('data-oy') || 0;
      const rotateDeg = +d3.select(this).attr('data-rotate') || 0;
      const rawT      = d3.select(this).attr('data-raw-text') || '';
      const label     = truncateLabel(rawT);
      const storedAnchor2 = d3.select(this).attr('data-text-anchor') || 'start';
      d3.select(this)
        .attr('text-anchor', storedAnchor2)
        .attr('transform', `translate(${ox},${oy}) rotate(${rotateDeg})`);
      d3.select(this).selectAll('tspan').remove();
      d3.select(this).append('tspan')
        .attr('x', 0).attr('y', 0).text(label);
    }
  });

  /* ── Step 6: Redraw edges for new layout ── */
  const gEdgeBg = d3.select('#g-edge-bg');
  const gEdges  = d3.select('#g-edges');
  const gLabels = d3.select('#g-edge-labels');

  gEdgeBg.selectAll('*').remove();
  gEdges.selectAll('*').remove();

  /* Draw edges immediately using final positions (gxPx/gyPx already computed) */
  if (targetLayout === 'grid') {
    drawEdgesGrid(edges, gEdgeBg, gEdges);
  } else {
    drawEdgesRadial(edges, gEdgeBg, gEdges);
  }
  drawEdgeLabelsForLayout(edges, gLabels);
}


/* ══════════════════════════════════════════════════════════════
   14. INIT GRAPH — orchestrates first render + toggle wiring
══════════════════════════════════════════════════════════════ */

async function initGraph(nodes, edges, svgEl) {
  /* Start in radial mode to build the graph, then switch to grid */
  currentLayout = 'radial';
  renderGraph(nodes, edges, svgEl);
  setupEdgeHoverTooltip(svgEl, edges);

  /* Switch to grid view as the default starting layout */
  await switchLayout('grid', nodes, edges);

  /* Wire up zoom buttons */
  document.getElementById('zoom-in').addEventListener('click', () => {
    const svgEl = document.getElementById('graph-svg');
    const t = d3.zoomTransform(svgEl);
    d3.select(svgEl).call(ZOOM.scaleBy, 1.3);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    const svgEl = document.getElementById('graph-svg');
    d3.select(svgEl).call(ZOOM.scaleBy, 1 / 1.3);
  });

  /* Wire up the view toggle buttons */
  document.querySelectorAll('.view-btn').forEach(btn => {
    /* Remove old listeners by cloning */
    const fresh = btn.cloneNode(true);
    btn.parentNode.replaceChild(fresh, btn);
    fresh.addEventListener('click', async () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      fresh.classList.add('active');
      await switchLayout(fresh.dataset.view, nodes, edges);
      /* Re-apply highlight filter after layout switch if one is active */
      if (activeHighlight) applyHighlightFilter(activeHighlight, nodes);
    });
  });

  /* Wire up search */
  initSearch(nodes);
  setupResizeHandler(nodes, edges);
}


/* ══════════════════════════════════════════════════════════════
   HIGHLIGHT FILTER
   When a filter is active, nodes matching the condition are full
   opacity; all others dim to 0.3. Clicking the active pill again
   clears the filter. Node clicks are still functional.
══════════════════════════════════════════════════════════════ */

let activeHighlight = null; // current filter key or null

/* Predicate functions — return true if a node matches the filter */
const HIGHLIGHT_FILTERS = {
  mauerberger_linked: n => ['true','1','yes'].includes((n.mauerberger_linked || '').toLowerCase().trim()),
  cai_linked:         n => ['true','1','yes'].includes((n.cai_linked || '').toLowerCase().trim()),
  amlo_frozen:        n => (n.note || '').toLowerCase().includes('amlo') ||
                           (n.status || '').toLowerCase().includes('amlo'),
  sec_suspended_jan:  n => (n.note || '').toLowerCase().includes('sec') ||
                           (n.status || '').toLowerCase().includes('sec') ||
                           (n.note || '').includes('Jan 2026') ||
                           (n.status || '').includes('Jan 2026'),
  nacc_investigation: n => (n.note || '').toLowerCase().includes('nacc') ||
                           (n.status || '').toLowerCase().includes('nacc'),
  erx_group:          n => (n.group || '').trim() === 'ERX Group (now KuCoin Thailand)',
  tidc_group:         n => (n.group || '').trim() === 'TIDC Group (Thailand partner of WorldCoin)',
};

/**
 * applyHighlightFilter(filterKey, nodes)
 * Dims all non-matching node-g elements to 0.3 opacity.
 * Pass null to clear.
 */
function applyHighlightFilter(filterKey, nodes) {
  activeHighlight = filterKey;

  if (!filterKey) {
    /* Clear: restore all nodes and edges to default opacity */
    d3.selectAll('.node-g').each(function() {
      this.style.removeProperty('opacity');
      d3.select(this).classed('highlight-dimmed', false);
    });
  /* Restore edge group visibility */
    const gEdgesBgR  = document.getElementById('g-edge-bg');
    const gEdgesMainR = document.getElementById('g-edges');
    if (gEdgesBgR)   gEdgesBgR.removeAttribute('opacity');
    if (gEdgesMainR) gEdgesMainR.removeAttribute('opacity');
    d3.selectAll('text.node-label').each(function() {
      this.style.removeProperty('opacity');
    });
    return;
  }

  const predicate = HIGHLIGHT_FILTERS[filterKey];
  if (!predicate) return;

  /* Apply to nodes — use inline style with !important via setAttribute */
  d3.selectAll('.node-g').each(function(d) {
    const node    = nodeMap.get(d.id);
    const matches = node ? predicate(node) : false;
    this.style.setProperty('opacity', matches ? '1' : '0.1', 'important');
    d3.select(this).classed('highlight-dimmed', !matches);
  });

  /* Dim labels */
  d3.selectAll('text.node-label').each(function() {
    const id   = d3.select(this).attr('data-label-for');
    const node = nodeMap.get(id);
    const matches = node ? predicate(node) : false;
    this.style.setProperty('opacity', matches ? '1' : '0.06', 'important');
  });

  /* Dim edges using data-source / data-target attributes which are always
     set on every edge element (more reliable than datum binding).        */
  /* Use CSS classes with !important to override all inline styles and transitions */
  /* Hide the entire edge groups — simplest and most reliable approach */
  const gEdgesBg  = document.getElementById('g-edge-bg');
  const gEdgesMain = document.getElementById('g-edges');
  if (gEdgesBg)   gEdgesBg.setAttribute('opacity', '0');
  if (gEdgesMain) gEdgesMain.setAttribute('opacity', '0');
}

/**
 * initHighlightFilter(nodes)
 * Wires up the highlight pill buttons.
 */
function initHighlightFilter(nodes) {
  /* Use event delegation on document so nothing can block it */
  document.addEventListener('click', function highlightPillHandler(ev) {
    const btn = ev.target.closest('.highlight-pill');
    if (!btn) return;
    const key = btn.dataset.filter;
    console.log('[highlight] pill clicked:', key);

      /* Reset node-selection state WITHOUT running transitions that would
         override the highlight opacity. Interrupt any running transitions
         first so they can't overwrite what we're about to set.          */
      if (selectedId) {
        selectedId = null;
        /* Interrupt all node transitions immediately */
        d3.selectAll('.node-g')
          .interrupt('focus')
          .classed('faded highlighted node-selected node-connected', false);
        d3.selectAll('.edge-path')
          .interrupt('focus')
          .classed('edge-focused edge-faded', false)
          .style('stroke-width', '1.5px');
        d3.selectAll('text.node-label').interrupt('focus');
        d3.selectAll('.edge-label-g').attr('opacity', 0);
        document.getElementById('right-placeholder').style.display = '';
        document.getElementById('node-detail').classList.remove('visible');
      }

      if (activeHighlight === key) {
        /* Clicking active pill again → clear filter */
        document.querySelectorAll('.highlight-pill').forEach(b => b.classList.remove('active'));
        applyHighlightFilter(null, nodes);
      } else {
        document.querySelectorAll('.highlight-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyHighlightFilter(key, nodes);
      }
  });
}

/* ── Custom scrollbar for panels (Safari-compatible) ────────────────
   Safari ignores ::-webkit-scrollbar when using overlay scrollbars.
   We hide the native scrollbar and draw our own thin thumb overlay.  */
function initCustomScrollbar(panel) {
  const track = document.createElement('div');
  track.className = 'custom-scrollbar';
  const thumb = document.createElement('div');
  thumb.className = 'custom-scrollbar-thumb';
  thumb.style.pointerEvents = 'all'; // thumb is draggable
  track.appendChild(thumb);
  panel.appendChild(track);

  function getThumbHeight() {
    return Math.max(30, (panel.clientHeight / panel.scrollHeight) * panel.clientHeight);
  }

  function updateThumb() {
    const scrollable  = panel.scrollHeight - panel.clientHeight;
    const scrollRatio = scrollable > 0 ? panel.scrollTop / scrollable : 0;
    const thumbH      = getThumbHeight();
    const maxTop      = panel.clientHeight - thumbH;
    thumb.style.height = thumbH + 'px';
    thumb.style.top    = (scrollRatio * maxTop) + 'px';
  }

  /* ── Drag to scroll ─────────────────────────────────────────── */
  let dragStartY = 0, dragStartScrollTop = 0;

  thumb.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    dragStartY         = e.clientY;
    dragStartScrollTop = panel.scrollTop;
    panel.classList.add('panel-scrolling');

    function onMouseMove(e) {
      const delta      = e.clientY - dragStartY;
      const thumbH     = getThumbHeight();
      const maxTop     = panel.clientHeight - thumbH;
      const scrollable = panel.scrollHeight - panel.clientHeight;
      const ratio      = maxTop > 0 ? delta / maxTop : 0;
      panel.scrollTop  = dragStartScrollTop + ratio * scrollable;
    }

    function onMouseUp() {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup',   onMouseUp);
      let t = setTimeout(() => panel.classList.remove('panel-scrolling'), 800);
    }

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
  });

  /* ── Click on track to jump ─────────────────────────────────── */
  track.addEventListener('mousedown', e => {
    if (e.target === thumb) return;
    const rect       = track.getBoundingClientRect();
    const clickY     = e.clientY - rect.top;
    const thumbH     = getThumbHeight();
    const ratio      = (clickY - thumbH / 2) / (panel.clientHeight - thumbH);
    panel.scrollTop  = ratio * (panel.scrollHeight - panel.clientHeight);
  });

  let scrollTimer;
  panel.addEventListener('scroll', () => {
    updateThumb();
    panel.classList.add('panel-scrolling');
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => panel.classList.remove('panel-scrolling'), 800);
  });

  new ResizeObserver(updateThumb).observe(panel);
  updateThumb();
}

document.addEventListener('DOMContentLoaded', () => {
  initCustomScrollbar(document.getElementById('panel-left'));
  initCustomScrollbar(document.getElementById('panel-right'));
});


/* ── Responsive panel toggle ────────────────────────────────────────── */
function initPanelToggle() {
  const panel  = document.getElementById('panel-left');
  const btn    = document.getElementById('panel-toggle');
  if (!panel || !btn) return;

  function isPortrait() { return window.innerWidth <= 768; }

  function setCollapsed(collapsed) {
    panel.classList.toggle('collapsed', collapsed);
    panel.classList.toggle('expanded', !collapsed);
    btn.textContent = collapsed ? '+' : '×';
    btn.title       = collapsed ? 'Expand panel' : 'Collapse panel';
  }

  btn.addEventListener('click', () => {
    setCollapsed(panel.classList.contains('expanded'));
  });

  /* Close panel when clicking outside (portrait only) */
  document.addEventListener('click', e => {
    if (!isPortrait()) return;
    if (panel.classList.contains('expanded') && !panel.contains(e.target)) {
      setCollapsed(true);
    }
  });

  /* On resize: reset classes if switching to desktop */
  window.addEventListener('resize', () => {
    if (!isPortrait()) {
      panel.classList.remove('collapsed', 'expanded');
    } else if (!panel.classList.contains('expanded')) {
      panel.classList.add('collapsed');
    }
  });

  /* Init state */
  if (isPortrait()) setCollapsed(true);
}

document.addEventListener('DOMContentLoaded', () => { main(); initPanelToggle(); });
</script>
