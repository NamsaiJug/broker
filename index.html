<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radial Network Visualization</title>

  <!-- D3.js v7 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <!-- Google Fonts: IBM Plex Sans Thai Looped — all weights, one place to change -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ================================================================
       CSS CUSTOM PROPERTIES
       Change colors / sizes here — they cascade everywhere.
    ================================================================ */
    /* ── FONT: change this one variable to restyle all text ── */
    :root {
      --font: 'IBM Plex Sans Thai Looped', sans-serif;

      /* ── Light mode — academic / forensic architecture ─────────── */
      --bg:             #fcfcfb;   /* near-white */
      --panel-bg:       #f4f2ee;   /* warm off-white */
      --panel-border:   #d4d0c8;   /* warm grey */
      --accent:         #1a1a1a;   /* near-black (replaces gold) */
      --people:         #1a1a1a;   /* person node bg — fetched from sheet */
      --accent2:        #ff2323;   /* forensic red */
      --text-primary:   #111111;
      --text-secondary: #444444;
      --text-muted:     #888880;

      /* Edge active colours */
      --edge-solid:          #222243;  /* non-shareholding */
      --edge-past:           #73738a;  /* past non-shareholding */
      --edge-share:          #3820ec;  /* shareholding */
      --edge-share-past:     #8e9aff;  /* past shareholding */
      /* Edge muted colours (full opacity, desaturated) */
      --edge-solid-muted:    #e8e8ee;
      --edge-past-muted:     #e8e8ee;
      --edge-share-muted:    #e7ecff;
      --edge-share-past-muted:#e7ecff;

      --left-w:         260px;
      --right-w:        300px;
      --radius-sm:      0px;
      --radius-md:      0px;
      --transition:     0.2s ease;
    }

    /* ================================================================
       RESET / BASE
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    /* ================================================================
       LAYOUT SKELETON
       [ LEFT PANEL ] [ SVG CANVAS ] [ RIGHT PANEL ]
    ================================================================ */
    #app {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* ── LEFT PANEL ─────────────────────────────────────────── */
    #panel-left {
      visibility: hidden;  /* hidden until sheet colours applied */
      position: fixed;
      top: 20px;
      left: 20px;
      bottom: 20px;
      width: var(--left-w);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      padding: 24px 18px;
      gap: 24px;
      overflow-y: auto;
      z-index: 20;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-title {
      font-family: var(--font);
      font-weight: 800;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .brand-updated {
      font-size: 11px;
      color: var(--text-muted);
    }

    .section-label {
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Legend blocks */
    .legend-group { display: flex; flex-direction: column; gap: 6px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Node type icons in legend */
    .leg-node {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .leg-node.person       { background: #1a1a1a; border: 2px solid #aaa; }
    .leg-node.company      { background: #2c6fad; }
    .leg-node.government   { background: #2a7a4e; }

    /* Edge line samples in legend */
    .leg-edge {
      width: 28px; height: 2px;
      flex-shrink: 0;
      position: relative;
    }
    /* Relationship legend colours set dynamically via buildRelationshipLegend() */

    /* Location color swatches */
    .leg-swatch {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── CENTER CANVAS ──────────────────────────────────────── */
    #canvas {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* Search bar sits inside canvas, top-right */
    #search-container {
      position: relative;  /* anchor for dropdown positioning */
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;         /* fill the panel width */
    }

    #search-input {
      background: #ffffff;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border var(--transition);
    }
    #search-input:focus { border-color: #1a1a1a; }
    #search-input::placeholder { color: var(--text-muted); }

    #search-dropdown {
      display: none;
      background: #ffffff;
      border: 1px solid var(--panel-border);
      border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      max-height: 220px;
      overflow-y: auto;
      position: absolute;  /* float over content below */
      top: 100%;           /* start right below the search-container */
      width: 100%;
      z-index: 30;
      left: 0;
    }
    #search-dropdown.visible { display: block; }

    .search-tabs {
      display: flex;
      border-bottom: 1px solid var(--panel-border);
    }
    .search-tab {
      flex: 1;
      padding: 6px;
      text-align: center;
      font-size: 11px;
      font-family: var(--font);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--text-muted);
      transition: color var(--transition), background var(--transition);
    }
    .search-tab.active { color: var(--accent); background: rgba(232,201,122,0.06); }

    .search-result {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: background var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .search-result:hover { background: rgba(0,0,0,0.04); color: var(--text-primary); }

    .search-empty {
      padding: 10px 12px;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* SVG fills the canvas */
    #graph-svg {
      width: 100%;
      height: 100%;
    }

    /* Tooltip for edge labels */
    #edge-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(13,15,20,0.92);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 11px;
      color: var(--text-secondary);
      max-width: 200px;
      display: none;
      z-index: 30;
    }

    /* ── View toggle (Radial / Grid) ─────────────────────────── */
    #view-toggle {
      visibility: hidden;
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      border: 1px solid var(--panel-border);
      overflow: hidden;
    }
    .view-btn {
      padding: 7px 20px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: var(--bg);
      transition: background 0.2s, color 0.2s;
    }
    .view-btn:last-child { border-right: none; }
    .view-btn.active {
      background: var(--accent);
      color: var(--bg);
    }
    .view-btn:hover:not(.active) {
      background: var(--accent);
      color: var(--bg);
    }

    /* Grid edges are <path> elements, not <line> */
    path.edge-path {
      fill: none;
      transition: stroke 0.2s ease;
    }
    path.edge-path:hover { opacity: 0.7 !important; }
    path.edge-path.edge-focused { stroke-width: 2.5px; }
    path.edge-path.edge-faded   { }


    /* Loading / error overlay */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fcfcfb; /* fixed neutral — doesn't flash with wrong sheet colour */
      z-index: 50;
      gap: 12px;
    }
    .overlay-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--panel-border);
      border-top-color: #ff2323;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay-text { color: var(--text-secondary); font-size: 13px; }
    .overlay-error { color: #ff2323; font-size: 13px; max-width: 360px; text-align: center; }

    /* ── RIGHT PANEL ────────────────────────────────────────── */
    #panel-right {
      visibility: hidden;  /* hidden until sheet colours applied */
      position: fixed;
      top: 20px;
      right: 20px;
      bottom: 20px;
      width: var(--right-w);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      padding: 24px 18px;
      gap: 0;
      overflow-y: auto;
      z-index: 20;
    }
    .right-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      text-align: center;
      font-size: 12px;
    }
    .right-placeholder svg { opacity: 0.25; }

    /* Node detail card */
    #node-detail { display: none; flex-direction: column; gap: 18px; }
    #node-detail.visible { display: flex; }

    .node-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--panel-border);
    }

    .node-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .node-header-text { display: flex; flex-direction: column; gap: 2px; }

    .node-name-th {
      font-family: var(--font);
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .node-name-en {
      font-size: 11px;
      color: var(--text-muted);
    }

    .node-type-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-family: var(--font);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .attrs { display: flex; flex-direction: column; gap: 8px; }

    .attr-row {
      display: flex;
      gap: 6px;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding-bottom: 6px;
    }
    .attr-label {
      color: var(--text-muted);
      min-width: 80px;
      flex-shrink: 0;
    }
    .attr-value { color: var(--text-secondary); word-break: break-word; }

    .note-box {
      background: rgba(0,0,0,0.03);
      border-left: 3px solid #1a1a1a;
      padding: 8px 10px;
      font-size: 12px;
      color: var(--text-secondary);
      border-radius: 0 4px 4px 0;
      line-height: 1.55;
    }

    /* Connections list */
    .conn-list { display: flex; flex-direction: column; gap: 8px; }

    .conn-item {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      cursor: pointer;
      transition: background var(--transition);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .conn-item:hover { background: var(--bg); cursor: pointer; }

    .conn-item-name { font-size: 14px; color: var(--text-primary); font-weight: 500; }
    .conn-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .conn-item-text-group { display: flex; flex-direction: column; gap: 0; flex: 1; min-width: 0; }
    .conn-type-group .conn-item + .conn-item { margin-top: 5px; }
    .conn-item-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--panel-border);
      border: 1px solid var(--panel-border);
      align-self: flex-start;
    }
    .conn-item-avatar-placeholder {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--panel-border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text-muted);
      align-self: flex-start;
    }
    .conn-type-group { margin-bottom: 12px; }
    .conn-type-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      padding-bottom: 4px;
    }
    .conn-type-pill {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 1000px;
      white-space: nowrap;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .conn-type-count {
      font-size: 10px;
      color: var(--text-muted);
    }
    .conn-item-type {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 1000px;
      color: var(--bg);
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .conn-item-amount { font-size: 12px; color: var(--edge-share); }
    .conn-item-detail { font-size: 12px; font-weight: 400; color: var(--text-secondary); }

    /* ── SVG element styles (applied via D3) ────────────────── */
    .node-circle { cursor: pointer; transition: opacity 0.2s; }
    .node-label  { font-family: var(--font); pointer-events: none; }
    /* When a node group is hovered, turn its label white.
       Labels are in g#g-node-labels, so we use a JS class on the <text>
       element directly (see mouseenter/mouseleave on node-g).            */
    text.node-label.label-hovered { fill: var(--text-primary) !important; }
    .edge-path   { fill: none; }
    .edge-bg     { fill: none; } /* wide semi-transparent background for shareholding */

    /* Fade class applied to non-selected elements */
    .faded { opacity: 0.08 !important; }
    .highlighted { opacity: 1 !important; }

    /* Edge default opacity */
    line.edge-path { transition: stroke 0.2s ease; }

    /* :hover always wins — highest specificity, beats all state classes */
    line.edge-path:hover { opacity: 0.7 !important; }

    /* State classes */
    line.edge-path.edge-focused { stroke-width: 2.5px; }
    line.edge-path.edge-faded   { }
    /* Highlight filter — universal selector works for both <line> and <path> */
    .hl-dim  { opacity: 0.02 !important; }
    .hl-show { opacity: 0.15 !important; }

    /* Connected nodes: no special stroke */
    .node-g.node-connected > circle.node-circle {
      stroke: none !important;
    }
    /* Selected node: accent stroke */
    .node-g.node-selected > circle.node-circle {
      stroke: var(--accent) !important;
      stroke-width: 2px !important;
    }

    /* ── Highlight filter pills ──────────────────────────────────── */
    .highlight-group { display: flex; flex-direction: column; gap: 6px; }

    .highlight-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--panel-border);
      cursor: pointer;
      font-size: 11px;
      color: var(--text-secondary);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      line-height: 1.4;
      background: transparent;
      font-family: var(--font);
      text-align: left;
    }
    .highlight-pill:hover {
      background: var(--bg);
    }
    .highlight-pill.active {
      background: var(--bg);
      border-color: var(--accent);
    }
    /* ── Custom scrollbars ───────────────────────────────────────── */
    /* Hide native scrollbars on all browsers */
    #panel-left, #panel-right {
      overflow-y: auto;
      scrollbar-width: none;        /* Firefox */
      -ms-overflow-style: none;     /* IE/Edge */
    }
    #panel-left::-webkit-scrollbar,
    #panel-right::-webkit-scrollbar { display: none; }  /* Chrome/Safari/Opera */

    /* Custom scrollbar track + thumb — JS-driven, works everywhere */
    .custom-scrollbar {
      position: absolute;
      right: 2px;
      top: 0;
      width: 3px;
      height: 100%;
      pointer-events: all;  /* enable click-on-track */
      z-index: 100;
      cursor: pointer;
    }
    .custom-scrollbar-thumb {
      position: absolute;
      width: 3px;
      border-radius: 2px;
      background: var(--text-muted);
      opacity: 0;
      transition: opacity 0.3s;
      right: 0;
    }
    .panel-scrolling .custom-scrollbar-thumb,
    #panel-left:hover .custom-scrollbar-thumb,
    #panel-right:hover .custom-scrollbar-thumb { opacity: 1; }
    /* ── Zoom controls ─────────────────────────────── */
    #zoom-controls {
      visibility: hidden;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      overflow: hidden;
    }
    .zoom-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-secondary);
      font-family: var(--font);
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .zoom-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }
    .zoom-divider {
      width: 1px;
      height: 20px;
      background: var(--panel-border);
    }

    /* ══════════════════════════════════════════════════════════════
       RESPONSIVE — portrait / mobile layout
       Breakpoint: max-width 768px (portrait tablet / phone)
    ══════════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* ── Left panel: top bar, collapsible ── */
      #panel-left {
        top: 15px;
        left: 15px;
        right: 15px;
        bottom: auto;
        width: auto !important;    /* override desktop --left-w */
        min-width: 0 !important;
        max-height: auto;
        /* Collapsed: only show brand (title + date) */
        height: auto;
        overflow: hidden;
        transition: height 0.3s ease, max-height 0.3s ease;
        z-index: 30;
      }

      /* Collapsed: clip content below the brand row */
      #panel-left.collapsed {
        overflow: hidden;
      }

      /* Expanded: 30vh height */
      #panel-left.expanded {
        height: 30vh;
        max-height: 30vh;
        overflow-y: auto;
      }

      /* Toggle button — top-right of panel */
      #panel-toggle {
        display: flex !important;
        position: absolute;
        top: 12px;
        right: 14px;
        width: 28px;
        height: 28px;
        align-items: center;
        justify-content: center;
        background: none;
        border: 1px solid var(--panel-border);
        color: var(--text-secondary);
        font-size: 16px;
        cursor: pointer;
        font-family: var(--font);
        line-height: 1;
        z-index: 5;
      }

      /* Hide everything below .brand when collapsed */
      #panel-left.collapsed > *:not(.brand):not(#panel-toggle) {
        display: none !important;
      }

      /* ── Right panel: bottom bar ── */
      #panel-right {
        top: auto;
        left: 15px;
        right: 15px;
        bottom: 15px;
        width: auto !important;
        min-width: 0 !important;
        height: 30vh;
        max-height: 30vh;
        overflow-y: auto;
        z-index: 30;
      }

      /* ── View toggle + zoom: adjust position ── */
      #view-toggle {
        top: auto;
        bottom: calc(30vh + 30px);
        left: 15px;
        transform: none;  /* remove desktop centring */
      }

      #zoom-controls {
        bottom: calc(30vh + 30px);
        left: auto;
        right: 15px;
        transform: none;
      }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ═══════════════════════════════════════════════════════════
       LEFT PANEL — title, legend
  ════════════════════════════════════════════════════════════ -->
  <aside id="panel-left" class="collapsed">
    <button id="panel-toggle" style="display:none" title="Expand panel">+</button>

    <div class="brand">
      <div class="brand-title" id="meta-title">Loading…</div>
      <div class="brand-updated" id="meta-date"></div>
    </div>

<!-- Edge Type Legend -->
    <div>
      <div class="section-label">Relationship Types</div>
      <div class="legend-group" id="relationship-legend"></div>
    </div>

    <!-- Location color legend — populated dynamically -->
    <div>
      <div class="section-label">Register Location</div>
      <div class="legend-group" id="location-legend"></div>
    </div>

    <!-- Highlight filter section -->
    <div>
      <div class="section-label">Highlight</div>
      <div class="highlight-group" id="highlight-group">
        <button class="highlight-pill" data-filter="mauerberger_linked">
          Listed Thai company with ≥10% shares controlled by companies linked to Mauerberger
        </button>
        <button class="highlight-pill" data-filter="cai_linked">
          Company in which George Tan (CAI) is authorized director
        </button>
        <button class="highlight-pill" data-filter="amlo_frozen">
          Holdings frozen by AMLO
        </button>
        <button class="highlight-pill" data-filter="sec_suspended_jan">
          Temporary suspended by SEC on 3 Jan 2026
        </button>
        <button class="highlight-pill" data-filter="nacc_investigation">
          Under investigation by NACC (as of Feb 2026)
        </button>
        <button class="highlight-pill" data-filter="erx_group">
          ERX Group (now KuCoin Thailand)
        </button>
        <button class="highlight-pill" data-filter="tidc_group">
          TIDC Group (Thailand partner of WorldCoin)
        </button>
      </div>
    </div>

    <!-- Misc hints -->
    <div style="margin-top:auto; color:var(--text-muted); font-size:11px; line-height:1.7;">
      Click a node to explore connections.<br>
      Scroll / pinch to zoom.
    </div>

<script>

/* ══════════════════════════════════════════════════════════════

const CONFIG = {

/* ── Register-location → fill color mapping ─────────────────────
   Add / edit entries as new locations appear in the data.       */
const LOCATION_COLORS = {
  'Thailand':               '#2c6fad',  // mid blue
  'Hong Kong':              '#b36b00',  // amber
  'Singapore':              '#2a7a4e',  // forest green

  'United States':          '#ff2323',  // forensic red

  'Mauritius':              '#4a7a20',  // olive

const EDGE_STYLE_DEFAULT = { stroke: '#222243', dash: '', bg: null, strokeMuted: '#e8e8ee' };

/* ── Node type → badge colors ────────────────────────────────── */
const TYPE_BADGE = {
  'person':            { bg: 'rgba(0,0,0,0.07)', color: '#1a1a1a'    },
  'company':           { bg: 'rgba(44,111,173,0.12)', color: '#2c6fad' },
